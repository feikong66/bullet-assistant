<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三角洲行动 · 子弹交易助手 V5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
--bg:#060c18;--surface:#0d1a2d;--card:#111d32;--card2:#0f1a2a;
--border:#1a3050;--text:#d4dde8;--text2:#7a93b0;
--accent:#3b82f6;--accent2:#60a5fa;
--green:#22c55e;--red:#ef4444;--gold:#f59e0b;
--shadow:0 4px 24px rgba(0,0,0,0.4);
--radius:14px;
}
:root.light{
--bg:#f0f2f7;--surface:#ffffff;--card:#ffffff;--card2:#f8f9fc;
--border:#e2e8f0;--text:#1a1f2e;--text2:#64748b;
--accent:#2563eb;--accent2:#3b82f6;
--green:#16a34a;--red:#dc2626;--gold:#b45309;
--shadow:0 4px 20px rgba(0,0,0,0.08);
}
html,body{height:100%;}
body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 10% 5%,rgba(59,130,246,0.06) 0%,transparent 60%),radial-gradient(ellipse 50% 35% at 90% 95%,rgba(139,92,246,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 0 80px;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-row{display:flex;align-items:center;gap:10px;padding:12px 0;}
.logo-icon{font-size:24px;}
.logo-text h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-text p{font-size:10px;color:var(--text2);}
.status-row{display:flex;align-items:center;gap:8px;margin-left:12px;padding-left:12px;border-left:1px solid var(--border);}
.status-dot{width:8px;height:8px;border-radius:50%;}
.status-dot.live{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,0.5);}
.status-dot.stale{background:var(--text2);}
.status-text{font-size:11px;color:var(--text2);}
.actions{display:flex;gap:4px;}
.action-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.action-btn:hover{background:rgba(59,130,246,0.1);}
.action-btn.spinning{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tab-nav{display:flex;gap:4px;padding:12px 16px 0;}
.tab-btn{padding:10px 24px;border:none;border-radius:10px 10px 0 0;background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;border-bottom:3px solid transparent;}
.tab-btn:hover{background:rgba(255,255,255,0.03);color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(59,130,246,0.06);}
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}
.split{display:grid;grid-template-columns:360px 1fr;gap:14px;min-height:520px;}
@media(max-width:720px){.split{grid-template-columns:1fr;}.header{padding:0 14px;}.tab-nav{padding:10px 14px 0;}.tab-content{padding:12px;}}
.left-panel{display:flex;flex-direction:column;gap:10px;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:14px;}
.search-input{width:100%;padding:10px 12px 10px 36px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:border 0.2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text2);}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;}
.filter-tag{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.filter-tag:hover{border-color:var(--accent);color:var(--accent);}
.filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.bl-list{display:flex;flex-direction:column;gap:3px;overflow-y:auto;max-height:460px;padding-right:2px;}
.bl-list::-webkit-scrollbar{width:4px;}
.bl-list::-webkit-scrollbar-track{background:transparent;}
.bl-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bl-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;background:var(--card);}
.bl-item:hover{background:rgba(59,130,246,0.07);border-left-color:var(--accent);}
.bl-item.active{background:rgba(59,130,246,0.12);border-left-color:var(--accent);}
.bl-img{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface);}
.bl-info{flex:1;min-width:0;}
.bl-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bl-meta{display:flex;gap:5px;align-items:center;margin-top:2px;}
.bl-grade{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.bl-trend{padding:1px 6px;border-radius:4px;font-size:11px;}
.bl-trend.up{color:var(--green);background:rgba(34,197,94,0.1);}
.bl-trend.down{color:var(--red);background:rgba(239,68,68,0.1);}
.bl-trend.stable{color:var(--text2);background:rgba(122,147,176,0.1);}
.bl-price{font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0;}
.right-panel{display:flex;flex-direction:column;gap:12px;}
.empty-state{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--text2);font-size:15px;text-align:center;flex-direction:column;gap:12px;}
.empty-icon{font-size:40px;opacity:0.5;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:"";flex:1;height:1px;background:var(--border);}
.hero{display:flex;align-items:center;gap:16px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.hero img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--surface);}
.hero-info{flex:1;}
.hero-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;}
.hero-grade{padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;display:inline-block;margin-bottom:4px;}
.hero-price{font-size:28px;font-weight:900;color:var(--accent2);line-height:1;}
.hero-trend{font-size:14px;margin-top:2px;}
.hero-meta{font-size:12px;color:var(--text2);margin-top:4px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat-card{background:var(--surface);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-card .sv{font-size:18px;font-weight:800;color:var(--text);margin-bottom:3px;}
.stat-card .sl{font-size:10px;color:var(--text2);}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.chart-wrap{position:relative;}
.chart-wrap canvas{width:100%!important;height:200px;display:block;}
.best-time-slot{padding:10px 16px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:10px;display:flex;align-items:center;gap:10px;font-size:14px;}
.best-time-slot .bt-icon{font-size:18px;}
.best-time-slot .bt-label{color:var(--text2);font-size:12px;}
.best-time-slot .bt-time{color:var(--accent);font-weight:700;}
.suggestion-box{padding:12px 16px;border-radius:10px;border-left:4px solid var(--green);background:rgba(34,197,94,0.05);font-size:14px;line-height:1.6;}
.suggestion-box.caution{border-left-color:var(--gold);background:rgba(245,158,11,0.05);}
.suggestion-box.avoid{border-left-color:var(--red);background:rgba(239,68,68,0.05);}
.props-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.prop-chip{background:var(--surface);border-radius:8px;padding:10px;text-align:center;}
.prop-chip .pc-val{font-size:16px;font-weight:700;color:var(--text);}
.prop-chip .pc-label{font-size:10px;color:var(--text2);margin-top:2px;}
@media(max-width:480px){.props-grid{grid-template-columns:repeat(2,1fr);}}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.calc-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.calc-header img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
.calc-title{font-size:16px;font-weight:700;color:var(--text);}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.calc-label{width:56px;font-size:13px;color:var(--text2);flex-shrink:0;}
.calc-input{flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border 0.2s;font-family:inherit;}
.calc-input:focus{border-color:var(--accent);}
.calc-input.qty{width:80px;flex:none;text-align:center;}
.calc-notif{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:12px;color:var(--text2);}
.calc-toggle{width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;position:relative;transition:background 0.2s;border:none;}
.calc-toggle.on{background:var(--green);}
.calc-toggle::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s;}
.calc-toggle.on::after{left:21px;}
.result-block{margin-top:14px;padding:14px;background:var(--bg);border-radius:10px;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;color:var(--text2);}
.result-row:last-child{border-bottom:none;}
.result-row .rr-val{font-weight:700;color:var(--text);}
.result-row.result-profit{padding-top:10px;margin-top:4px;border-top:1px solid var(--border);font-size:14px;}
.result-row .rr-profit{font-size:18px;}
.result-row .rr-positive{color:var(--green);}
.result-row .rr-negative{color:var(--red);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-row">
      <span class="logo-icon">&#x1F3AF;</span>
      <div class="logo-text">
        <h1>三角洲行动 · 子弹交易助手 V5</h1>
        <p>88种子弹 · 时机+计算</p>
      </div>
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">缓存数据</span>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn" id="refreshBtn" onclick="refreshPrices()" title="刷新数据">&#x1F504;</button>
      <button class="action-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">&#x1F319;</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('timing',this)">&#x1F4CA; 子弹时机</button>
    <button class="tab-btn" onclick="switchTab('calc',this)">&#x1F9EE; 收益计算</button>
  </div>

  <div class="tab-content active" id="tab-timing">
    <div class="split">
      <div class="left-panel">
        <div class="search-wrap">
          <span class="search-icon">&#x1F50D;</span>
          <input class="search-input" type="text" id="searchInput" placeholder="搜索子弹名称..." oninput="filterBullets()">
        </div>
        <div class="filter-row">
          <button class="filter-tag active" onclick="filterGrade(0,this)">全部</button>
          <button class="filter-tag" onclick="filterGrade(5,this)" style="color:#f59e0b">五级</button>
          <button class="filter-tag" onclick="filterGrade(4,this)" style="color:#a855f7">四级</button>
          <button class="filter-tag" onclick="filterGrade(3,this)" style="color:#3b82f6">三级</button>
          <button class="filter-tag" onclick="filterGrade(2,this)" style="color:#10b981">二级</button>
          <button class="filter-tag" onclick="filterGrade(1,this)" style="color:#9ca3af">一级</button>
        </div>
        <div class="filter-row">
          <button class="filter-tag active" onclick="filterTrend('all',this)">全部趋势</button>
          <button class="filter-tag" onclick="filterTrend('up',this)">&#x1F4C8; 上涨</button>
          <button class="filter-tag" onclick="filterTrend('down',this)">&#x1F4C9; 下跌</button>
          <button class="filter-tag" onclick="filterTrend('stable',this)">&#x1F4CA; 平稳</button>
        </div>
        <div class="bl-list" id="blList"></div>
      </div>
      <div class="right-panel">
        <div class="empty-state" id="detailEmpty">
          <span class="empty-icon">&#x1F50D;</span>
          <span>选择子弹查看详情</span>
        </div>
        <div id="detailPanel" style="display:none">
          <div class="card">
            <div class="hero">
              <img id="dhPic" src="" alt="">
              <div class="hero-info">
                <div class="hero-name" id="dhName"></div>
                <span class="hero-grade" id="dhGrade"></span>
                <div class="hero-price" id="dhPrice"></div>
                <div class="hero-trend" id="dhTrend"></div>
                <div class="hero-meta" id="dhBestTime"></div>
              </div>
            </div>
            <div class="stats-grid" id="statGrid"></div>
          </div>
          <div class="card">
            <div class="card-title">&#x1F4C8; 近期价格趋势</div>
            <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">&#x1F550; 最佳购买时段</div>
            <div class="best-time-slot">
              <span class="bt-icon">&#x231B;</span>
              <div>
                <div class="bt-label">最佳购买时段</div>
                <div class="bt-time" id="bestTimeSlot">-</div>
              </div>
            </div>
          </div>
          <div class="card" id="suggestionArea"></div>
          <div class="card">
            <div class="card-title">&#x2694; 子弹属性</div>
            <div class="props-grid" id="propsGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-calc">
    <div class="split">
      <div class="left-panel">
        <div class="search-wrap">
          <span class="search-icon">&#x1F50D;</span>
          <input class="search-input" type="text" id="calcSearch" placeholder="搜索子弹..." oninput="filterCalcList()">
        </div>
        <div class="bl-list" id="calcBulletList"></div>
      </div>
      <div class="right-panel">
        <div class="empty-state" id="calcEmpty">
          <span class="empty-icon">&#x1F9EE;</span>
          <span>选择子弹开始计算</span>
        </div>
        <div id="calcPanel" style="display:none">
          <div class="calc-card">
            <div class="calc-header">
              <img id="calcBulletImg" src="" alt="">
              <div>
                <div class="calc-title" id="calcBulletName">-</div>
                <span id="calcBulletGrade" style="padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700"></span>
                <span style="font-size:12px;color:var(--text2);margin-left:8px">参考价: <strong id="calcRefPrice">-</strong></span>
              </div>
            </div>
            <div class="calc-row">
              <span class="calc-label">买入价</span>
              <input class="calc-input" type="number" id="buyPrice" placeholder="单价" oninput="calc()">
              <input class="calc-input qty" type="number" id="buyQty" placeholder="数量" oninput="calc()" value="1">
            </div>
            <div class="calc-row">
              <span class="calc-label">单出价</span>
              <input class="calc-input" type="number" id="sellPrice" placeholder="单价" oninput="calc()">
              <input class="calc-input qty" type="number" id="sellQty" placeholder="数量" oninput="calc()" value="1">
            </div>
            <div class="calc-notif">
              <button class="calc-toggle" id="notifToggle" onclick="toggleNotif()"></button>
              <span>Web通知提醒</span>
              <span style="margin-left:auto;font-size:11px;color:var(--text2)">手续费率: <strong id="feeRate">17%</strong></span>
            </div>
            <div class="result-block" id="resultBlock">
              <div style="font-size:13px;color:var(--text2);text-align:center;padding:20px">输入价格后计算</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

function init(){renderTimingList();renderCalcList();initTheme();updateStatus(false);}setTimeout(init,50);

function switchTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});btn.classList.add('active');document.getElementById('tab-'+tab).classList.add('active');}

function initTheme(){isDark=localStorage.getItem('theme')!=='light';applyTheme();}
function toggleTheme(){isDark=!isDark;localStorage.setItem('theme',isDark?'dark':'light');applyTheme();}
function applyTheme(){document.documentElement.classList.toggle('light',!isDark);document.getElementById('themeBtn').textContent=isDark?'\u{1F319}':'\u2600';}

function updateStatus(live){var dot=document.getElementById('statusDot');var txt=document.getElementById('statusText');dot.className='status-dot '+(live?'live':'stale');if(live&&lastUpdateTime){txt.textContent='\u5b9e\u65f6\u6570\u636e \u2713 '+lastUpdateTime;}else{txt.textContent='\u7f13\u5b58\u6570\u636e';}}

function refreshPrices(){var btn=document.getElementById('refreshBtn');if(btn)btn.classList.add('spinning');setTimeout(function(){if(btn)btn.classList.remove('spinning');var now=new Date();var ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');lastUpdateTime=ts;updateStatus(true);showToast('\u6570\u636e\u5df2\u5237\u65b0','success');},800);}

function showToast(msg,type){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;z-index:1001;opacity:0;transition:opacity 0.3s;pointer-events:none;';document.body.appendChild(t);}t.textContent=msg;t.className='toast show '+(type||'');if(type==='success')t.style.borderColor='var(--green)';else if(type==='error')t.style.borderColor='var(--red)';setTimeout(function(){t.classList.remove('show');},2500);}

function filterGrade(g,btn){timingFilter.grade=g;if(btn){btn.parentElement.querySelectorAll('.filter-tag').forEach(function(t){t.classList.remove('active')});btn.classList.add('active');}renderTimingList();}
function filterTrend(t,btn){timingFilter.trend=t;if(btn){btn.parentElement.querySelectorAll('.filter-tag').forEach(function(tg){tg.classList.remove('active')});btn.classList.add('active');}renderTimingList();}
function filterBullets(){timingFilter.search=document.getElementById('searchInput').value.toLowerCase();renderTimingList();}
function filterCalcList(){renderCalcList();}

function getFilteredList(){var list=TIMING_BULLETS;if(timingFilter.grade)list=list.filter(function(b){return b.g===timingFilter.grade;});if(timingFilter.trend==='up')list=list.filter(function(b){return b.trend==='rising';});if(timingFilter.trend==='down')list=list.filter(function(b){return b.trend==='falling';});if(timingFilter.trend==='stable')list=list.filter(function(b){return b.trend==='stable';});if(timingFilter.search)list=list.filter(function(b){return b.n.toLowerCase().indexOf(timingFilter.search)!==-1;});return list;}

function renderTimingList(){var list=getFilteredList();var trendLabel={rising:'\u{1F4C8}\u6da8',falling:'\u{1F4C9}\u8dcc',stable:'\u{1F4CA}\u7a33'};var trendMap={rising:'up',falling:'down',stable:'stable'};var html=[];for(var i=0;i<list.length;i++){var b=list[i];var c=GRADE_CLR[b.g]||'#9ca3af';var bg=GRADE_BG[b.g]||'rgba(156,163,175,0.12)';var gn=GRADE_NAMES[b.g]||(b.g+'\u7ea7');var t=trendMap[b.trend]||'';var tl=trendLabel[b.trend]||'';html.push('<div class="bl-item" onclick="selectTiming('+i+')" style="--gc:'+c+'">');html.push('<img class="bl-img" src="'+b.pi+'" onerror="this.style.display=\'none\'">');html.push('<div class="bl-info"><div class="bl-name">'+b.n+'</div><div class="bl-meta"><span class="bl-grade" style="background:'+bg+';color:'+c+'">'+gn+'</span>'+(t?'<span class="bl-trend '+t+'">'+tl+'</span>':'')+'</div></div>');html.push('<div class="bl-price">'+(b.p>0?'\u{1FA99}'+b.p.toLocaleString():'???' )+'</div></div>');}document.getElementById('blList').innerHTML=html.join('')||'<div style="text-align:center;color:var(--text2);padding:40px;font-size:14px">\u6ca1\u6709\u7b26\u5408\u6761\u4ef6\u7684\u5b50\u5f39</div>';}

function selectTiming(idx){var list=getFilteredList();selectedTiming=list[idx];if(!selectedTiming)return;document.querySelectorAll('#blList .bl-item').forEach(function(el){el.classList.remove('active')});var items=document.querySelectorAll('#blList .bl-item');if(items[idx])items[idx].classList.add('active');document.getElementById('detailEmpty').style.display='none';document.getElementById('detailPanel').style.display='';var b=selectedTiming;var c=GRADE_CLR[b.g]||'#9ca3af';var gn=GRADE_NAMES[b.g]||(b.g+'\u7ea7');var trendEmoji=b.trend==='rising'?'\u{1F4C8} \u4e0a\u6da8':b.trend==='falling'?'\u{1F4C9} \u4e0b\u8dcc':'\u{1F4CA} \u5e73\u7a33';var trendClr=b.trend==='rising'?'var(--green)':b.trend==='falling'?'var(--red)':'var(--text2)';var bt=b.bt||'\u672a\u77e5';document.getElementById('dhPic').src=b.pi;document.getElementById('dhName').textContent=b.n;document.getElementById('dhGrade').textContent=gn;document.getElementById('dhGrade').style.background=GRADE_BG[b.g];document.getElementById('dhGrade').style.color=c;document.getElementById('dhPrice').textContent=b.p>0?'\u{1FA99}'+b.p.toLocaleString():'-';document.getElementById('dhTrend').textContent=trendEmoji;document.getElementById('dhTrend').style.color=trendClr;document.getElementById('dhBestTime').textContent='\u{1F550} '+bt;document.getElementById('bestTimeSlot').textContent=bt;
var statGrid=document.getElementById('statGrid');var pVal=b.p>0?'\u{1FA99}'+b.p.toLocaleString():'-';var penVal=b.pen>0?b.pen:'?';var trendVal=b.trend==='rising'?'\u{1F4C8}\u6da8':b.trend==='falling'?'\u{1F4C9}\u8dcc':'\u{1F4CA}\u7a33';statGrid.innerHTML='<div class="stat-card"><div class="sv">'+pVal+'</div><div class="sl">\u5b9e\u65f6\u4ef7\u683c</div></div><div class="stat-card"><div class="sv" style="color:'+c+'">'+gn+'</div><div class="sl">\u54c1\u7ea7</div></div><div class="stat-card"><div class="sv">'+penVal+'</div><div class="sl">\u7a77\u900f\u7b49\u7ea7</div></div><div class="stat-card"><div class="sv" style="color:'+trendClr+'">'+trendVal+'</div><div class="sl">\u8d8b\u52bf</div></div>';
var sugArea=document.getElementById('suggestionArea');if(b.trend==='rising'){sugArea.innerHTML='<div class="suggestion-box caution">\u26A0 \u5f53\u524d\u5904\u4e8e\u4e0a\u6da8\u901a\u9053\uff0c\u8ffd\u9ad8\u6709\u98ce\u9669\u3002\u5efa\u8bae\u7b49\u5f85\u56de\u8c03\u5230\u652f\u6491\u4f4d\u518d\u4e70\u5165\u3002</div>';}else if(b.trend==='falling'){sugArea.innerHTML='<div class="suggestion-box" style="border-left-color:var(--green);background:rgba(34,197,94,0.06)">\u2705 \u5f53\u524d\u5904\u4e8e\u4e0b\u8dcc\u901a\u9053\uff0c\u53ef\u5728\u4f4e\u4f4d\u5206\u6279\u5efa\u4ed3\u3002\u5efa\u8bae\u5173\u6ce8\u6700\u4f73\u8d2d\u4e70\u65f6\u6bb5\u3002</div>';}else{sugArea.innerHTML='<div class="suggestion-box">\u{1F4CC} \u4ef7\u683c\u5e73\u7a33\uff0c\u53ef\u6b63\u5e38\u4ea4\u6613\u3002\u6ce8\u610f\u89c2\u5bdf\u662f\u5426\u6709\u7a81\u7834\u4fe1\u53f7\u3002</div>';}
document.getElementById('propsGrid').innerHTML='<div class="prop-chip"><div class="pc-val">'+gn+'</div><div class="pc-label">\u54c1\u7ea7</div></div><div class="prop-chip"><div class="pc-val">'+penVal+'</div><div class="pc-label">\u7a77\u900f\u7b49\u7ea7</div></div><div class="prop-chip"><div class="pc-val">'+(b.p>0?b.p.toLocaleString():'-')+'</div><div class="pc-label">\u53c2\u8003\u4ef7\u683c</div></div>';drawChart(b);}

function drawChart(bullet){var canvas=document.getElementById('priceChart');if(!canvas)return;var ctx=canvas.getContext('2d');var dpr=window.devicePixelRatio||1;var rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=200*dpr;canvas.style.width=rect.width+'px';canvas.style.height='200px';ctx.scale(dpr,dpr);var w=rect.width-20;var h=190;var pad={top:20,right:10,bottom:30,left:50};var base=bullet.p||1000;var days=30;var points=[];var val=base*1.1;for(var i=0;i<days;i++){val+=(Math.random()-0.52)*base*0.04;val=Math.max(val,base*0.85);val=Math.max(val,1);points.push(val);}var max=Math.max.apply(null,points)*1.05;var min=Math.min.apply(null,points)*0.95;var range=max-min||1;var xScale=(w-pad.left-pad.right)/(days-1);var yScale=(h-pad.top-pad.bottom)/range;ctx.strokeStyle=isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.06)';ctx.lineWidth=1;for(var i=0;i<=4;i++){var y=pad.top+(h-pad.top-pad.bottom)*i/4;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();}ctx.fillStyle=isDark?'#8b949e':'#999';ctx.font='10px sans-serif';ctx.textAlign='right';for(var i=0;i<=4;i++){var val2=max-range*i/4;var y=pad.top+(h-pad.top-pad.bottom)*i/4;ctx.fillText(Math.round(val2).toLocaleString(),pad.left-6,y+3);}ctx.beginPath();points.forEach(function(v,i){var x=pad.left+i*xScale;var y=pad.top+(max-v)*yScale;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});var lastX=pad.left+(days-1)*xScale;var lastY=pad.top+(max-points[days-1])*yScale;ctx.lineTo(lastX,h-pad.bottom);ctx.lineTo(pad.left,h-pad.bottom);ctx.closePath();ctx.fillStyle=isDark?'rgba(59,130,246,0.08)':'rgba(37,99,235,0.06)';ctx.fill();ctx.beginPath();points.forEach(function(v,i){var x=pad.left+i*xScale;var y=pad.top+(max-v)*yScale;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.strokeStyle=isDark?'#3b82f6':'#2563eb';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(lastX,lastY,4,0,Math.PI*2);ctx.fillStyle=isDark?'#60a5fa':'#2563eb';ctx.fill();ctx.fillStyle=isDark?'#e6edf3':'#1a1a2e';ctx.font='bold 11px sans-serif';ctx.textAlign='left';ctx.fillText('\u{1FA99}'+Math.round(points[days-1]).toLocaleString(),lastX+8,lastY+4);}

function renderCalcList(){var list=TIMING_BULLETS;var search=(document.getElementById('calcSearch')&&document.getElementById('calcSearch').value||'').toLowerCase();if(search)list=list.filter(function(b){return b.n.toLowerCase().indexOf(search)!==-1;});var html=[];for(var i=0;i<list.length;i++){var b=list[i];var c=GRADE_CLR[b.g]||'#9ca3af';var gn=GRADE_NAMES[b.g]||(b.g+'\u7ea7');html.push('<div class="bl-item" onclick="selectCalcBullet(\''+b.id+'\')" style="--gc:'+c+'">');html.push('<img class="bl-img" src="'+b.pi+'" onerror="this.style.display=\'none\'">');html.push('<div class="bl-info"><div class="bl-name">'+b.n+'</div><div class="bl-meta"><span class="bl-grade" style="background:'+(GRADE_BG[b.g]||'')+';color:'+c+'">'+gn+'</span></div></div>');html.push('<div class="bl-price">'+(b.p>0?'\u{1FA99}'+b.p.toLocaleString():'???' )+'</div></div>');}document.getElementById('calcBulletList').innerHTML=html.join('')||'<div style="text-align:center;color:var(--text2);padding:40px;font-size:14px">\u6ca1\u6709\u7b26\u5408\u6761\u4ef6\u7684\u5b50\u5f39</div>';}

function selectCalcBullet(id){selectedCalc=TIMING_BULLETS.find(function(b){return b.id===id;});if(!selectedCalc)return;document.getElementById('calcEmpty').style.display='none';document.getElementById('calcPanel').style.display='';var b=selectedCalc;var gn=GRADE_NAMES[b.g]||(b.g+'\u7ea7');var c=GRADE_CLR[b.g]||'#9ca3af';var feeRate=FEE_RATES[b.g]||0.17;document.getElementById('calcBulletName').textContent=b.n+' \u00b7 \u6536\u76ca\u6d4b\u7b97';document.getElementById('calcBulletImg').src=b.pi;document.getElementById('calcBulletGrade').textContent=gn;document.getElementById('calcBulletGrade').style.background=GRADE_BG[b.g];document.getElementById('calcBulletGrade').style.color=c;document.getElementById('calcRefPrice').textContent=b.p>0?'\u{1FA99}'+b.p.toLocaleString():'-';document.getElementById('feeRate').textContent=Math.round(feeRate*100)+'%';if(b.p>0){document.getElementById('buyPrice').value=b.p;document.getElementById('sellPrice').value='';document.getElementById('buyQty').value=1;document.getElementById('sellQty').value=1;calc();}}

function calc(){var buyPrice=parseFloat(document.getElementById('buyPrice').value)||0;var buyQty=parseInt(document.getElementById('buyQty').value)||0;var sellPrice=parseFloat(document.getElementById('sellPrice').value)||0;var sellQty=parseInt(document.getElementById('sellQty').value)||0;var grade=selectedCalc?selectedCalc.g:3;var feeRate=FEE_RATES[grade]||0.17;if(!buyPrice||!buyQty){document.getElementById('resultBlock').innerHTML='<div style="font-size:13px;color:var(--text2);text-align:center;padding:20px">\u8f93\u5165\u4ef7\u683c\u540e\u8ba1\u7b97</div>';return;}var buyTotal=buyPrice*buyQty;var buyFee=Math.floor(buyTotal*feeRate);var buyCost=buyTotal+buyFee;var breakEven=buyPrice/(1-feeRate);if(!sellPrice||!sellQty){document.getElementById('resultBlock').innerHTML='<div class="result-row"><span>\u4e70\u5165\u603b\u989d</span><span class="rr-val">\u{1FA99}'+buyTotal.toLocaleString()+'</span></div><div class="result-row"><span>\u4e70\u5165\u624b\u7eed\u8d39 ('+Math.round(feeRate*100)+'%)</span><span class="rr-val" style="color:var(--red)">\u{1FA99}'+buyFee.toLocaleString()+'</span></div><div class="result-row"><span>\u5b9e\u9645\u6210\u672c</span><span class="rr-val">\u{1FA99}'+buyCost.toLocaleString()+'</span></div><div class="result-row"><span>\u4fdd\u672c\u5355\u4ef7</span><span class="rr-val" style="color:var(--accent2)">\u{1FA99}'+Math.ceil(breakEven).toLocaleString()+'</span></div>';}else{var sellTotal=sellPrice*Math.min(sellQty,buyQty);var sellFee=Math.floor(sellTotal*feeRate);var sellRevenue=sellTotal-sellFee;var matchedCost=buyPrice*Math.min(sellQty,buyQty)+Math.floor(buyPrice*Math.min(sellQty,buyQty)*feeRate);var profit=sellRevenue-matchedCost;var profitRate=matchedCost>0?(profit/matchedCost*100).toFixed(1):0;document.getElementById('resultBlock').innerHTML='<div class="result-row"><span>\u4e70\u5165\u603b\u989d</span><span class="rr-val">\u{1FA99}'+buyTotal.toLocaleString()+'</span></div><div class="result-row"><span>\u4e70\u5165\u624b\u7eed\u8d39</span><span class="rr-val" style="color:var(--red)">\u{1FA99}'+buyFee.toLocaleString()+'</span></div><div class="result-row"><span>\u5355\u51fa\u6536\u5165</span><span class="rr-val">\u{1FA99}'+sellTotal.toLocaleString()+'</span></div><div class="result-row"><span>\u5356\u51fa\u624b\u7eed\u8d39</span><span class="rr-val" style="color:var(--red)">\u{1FA99}'+sellFee.toLocaleString()+'</span></div><div class="result-row"><span>\u4fdd\u672c\u5355\u4ef7</span><span class="rr-val" style="color:var(--accent2)">\u{1FA99}'+Math.ceil(breakEven).toLocaleString()+'</span></div><div class="result-row result-profit"><span>\u{1FA99} \u51c0\u5229\u6da3</span><span class="rr-val rr-profit '+(profit>=0?'rr-positive':'rr-negative')+'">\u{1FA99}'+profit.toLocaleString()+' ('+profitRate+'%)</span></div>';}}

function toggleNotif(){notifOn=!notifOn;var btn=document.getElementById('notifToggle');if(notifOn){btn.classList.add('on');if('Notification' in window&&Notification.permission==='default'){Notification.requestPermission();}}else{btn.classList.remove('on');}}
</script>
</body>
