<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动 · 子弹交易助手 V6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060c18;--card:#0f1923;--border:#1e2d40;--text:#dde6ef;--muted:#5a6d7e;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;}
:root.light{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;}
html,body{height:100%;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);}
.app{max-width:1400px;margin:0 auto;padding:12px;display:grid;grid-template-columns:320px 1fr;gap:12px;}
@media(max-width:900px){.app{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.header h1{font-size:20px;background:linear-gradient(135deg,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.btn{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:6px;color:var(--blue);padding:5px 12px;font-size:11px;cursor:pointer;}
.btn:hover{background:rgba(59,130,246,0.25);}
.theme-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sidebar{display:flex;flex-direction:column;gap:8px;}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
.search-box input:focus{border-color:var(--blue);}
.filter-row{display:flex;flex-wrap:wrap;gap:4px;}
.filter-btn{padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;}
.filter-btn.active{border-color:var(--blue);background:rgba(59,130,246,0.12);color:var(--blue);}
.bullet-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 280px);}
.bullet-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;}
.bullet-item:hover{background:rgba(59,130,246,0.08);border-color:var(--border);}
.bullet-item.active{background:rgba(59,130,246,0.12);border-color:var(--blue);}
.bullet-left{display:flex;align-items:center;gap:8px;}
.bullet-name{font-size:12px;font-weight:500;}
.bullet-grade{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
.bullet-price{font-size:12px;color:var(--yellow);font-family:'Courier New',monospace;font-weight:600;}
.bullet-change{font-size:9px;margin-left:4px;}
.up{color:var(--green);}.dn{color:var(--red);}
.main{display:flex;flex-direction:column;gap:12px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr;}}
.price-hero{grid-column:1/-1;background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.04));border:1px solid rgba(59,130,246,0.2);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.price-main{font-size:28px;font-weight:900;color:var(--yellow);font-family:'Courier New',monospace;}
.price-label{font-size:10px;color:var(--muted);}
.price-range{display:flex;gap:16px;font-size:12px;}
.price-range span{display:flex;flex-direction:column;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;}
.stat-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;}
.stat-val{font-size:14px;font-weight:700;font-family:'Courier New',monospace;}
.g{color:var(--green);}.r{color:var(--red);}.y{color:var(--yellow);}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.time-block{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.time-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.time-row span{color:var(--muted);}
.time-row strong{color:var(--green);font-family:'Courier New',monospace;}
.gun-list,.mat-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.gun-tag{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--blue);}
.mat-tag{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--purple);}
.calc-section{margin-top:4px;}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.input-group{margin-bottom:8px;}
.input-label{display:block;font-size:10px;color:var(--muted);margin-bottom:2px;}
.input-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.input-row input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;padding:7px 9px;font-family:'Courier New',monospace;}
.input-row .unit{padding:0 8px;font-size:10px;color:var(--muted);border-left:1px solid var(--border);}
.result-box{background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(59,130,246,0.04));border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:12px;margin-top:8px;}
.result-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.result-row span{color:var(--muted);}
.result-row strong{font-family:'Courier New',monospace;}
.result-row.profit strong{color:var(--green);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;z-index:1001;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎯 三角洲行动 · 子弹交易助手 V6</h1>
    <div class="status-bar">
      <span class="status-dot"></span>
      <span id="statusText">实时数据</span>
      <span id="updateTime">-</span>
      <button class="btn" onclick="refreshData()">🔄 刷新</button>
      <button class="btn theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="sidebar card">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索子弹..." oninput="filterBullets()">
    </div>
    <div class="filter-row" id="gradeFilter">
      <button class="filter-btn active" data-grade="0">全部</button>
      <button class="filter-btn" data-grade="5">五级</button>
      <button class="filter-btn" data-grade="4">四级</button>
      <button class="filter-btn" data-grade="3">三级</button>
      <button class="filter-btn" data-grade="2">二级</button>
      <button class="filter-btn" data-grade="1">一级</button>
    </div>
    <div class="filter-row" id="trendFilter">
      <button class="filter-btn active" data-trend="">全部趋势</button>
      <button class="filter-btn" data-trend="rising">📈 上涨</button>
      <button class="filter-btn" data-trend="falling">📉 下跌</button>
    </div>
    <div class="bullet-list" id="bulletList"></div>
  </div>
  <div class="main">
    <div id="detailArea" class="card">
      <div style="text-align:center;color:var(--muted);padding:40px;">👈 选择左侧子弹查看数据详情<br>含今日高低价、3/7/30日涨幅、最佳购买时段、可用枪械</div>
    </div>
    <div class="card calc-section">
      <div class="section-title">🧮 收益计算器</div>
      <div class="calc-grid">
        <div class="input-group">
          <label class="input-label">买入单价</label>
          <div class="input-row"><input type="number" id="buyPrice" oninput="calc()" placeholder="0"><span class="unit">¥</span></div>
        </div>
        <div class="input-group">
          <label class="input-label">卖出单价</label>
          <div class="input-row"><input type="number" id="sellPrice" oninput="calc()" placeholder="0"><span class="unit">¥</span></div>
        </div>
        <div class="input-group">
          <label class="input-label">数量</label>
          <div class="input-row"><input type="number" id="qty" oninput="calc()" value="100"><span class="unit">发</span></div>
        </div>
        <div class="input-group">
          <label class="input-label">品级（手续费）</label>
          <div class="input-row"><input type="number" id="grade" oninput="calc()" value="4" min="1" max="5"><span class="unit">级</span></div>
        </div>
      </div>
      <div class="result-box" id="calcResult">
        <div class="result-row"><span>买入总价</span><strong id="rBuyTotal">¥0</strong></div>
        <div class="result-row"><span>买入手续费</span><strong id="rBuyFee">¥0</strong></div>
        <div class="result-row"><span>卖出总收入</span><strong id="rSellTotal">¥0</strong></div>
        <div class="result-row"><span>卖出手续费</span><strong id="rSellFee">¥0</strong></div>
        <div class="result-row profit"><span>净利润</span><strong id="rProfit">¥0</strong></div>
        <div class="result-row"><span>利润率</span><strong id="rRate">0%</strong></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

var idx=-1,fG=0,fT="",isL=false,timer=null;

function fm(n){return n.toLocaleString()}

function rL(){
  var h="";
  BULLETS.forEach(function(b,i){
    if(fG&&b.g!==fG)return;
    if(fT&&b.tr!==fT)return;
    var sq=document.getElementById("searchInput").value.trim().toLowerCase();
    if(sq&&b.n.toLowerCase().indexOf(sq)===-1)return;
    var ac=i===idx?" active":"";
    var st="background:"+GC[b.g]+"22;color:"+GC[b.g]+";border:1px solid "+GC[b.g]+"44;";
    h+="<div class=\"bullet-item"+ac+"\" onclick=\"selIdx("+i+")\">";
    h+="<div class=\"bullet-left\"><span class=\"bullet-grade\" style=\""+st+"\">"+GN[b.g]+"</span>";
    h+="<span class=\"bullet-name\">"+b.n+"</span></div>";
    h+="<span class=\"bullet-price\">"+fm(b.pr)+"</span></div>";
  });
  document.getElementById("bulletList").innerHTML=h||"<div style=\"text-align:center;padding:20px;color:var(--muted)\">无匹配结果</div>";
}

function selIdx(i){idx=i;renderDetail(i);rL()}

function renderDetail(i){
  var b=BULLETS[i];if(!b)return;
  var h="";

  // Price hero
  h+="<div class=\"price-hero\">";
  h+="<div><div class=\"price-label\">"+b.n+" · "+GN[b.g]+" · 穿透Lv."+b.pn+"</div>";
  h+="<div class=\"price-main\">¥"+fm(b.pr)+"</div></div>";
  h+="<div class=\"price-range\"><span><small style=\"color:var(--muted)\">今日最高</small><strong>¥"+fm(b.mx)+(b.mx_t?" <small>"+b.mx_t+"</small>":"")+"</strong></span>";
  h+="<span><small style=\"color:var(--muted)\">今日最低</small><strong>¥"+fm(b.mn)+(b.mn_t?" <small>"+b.mn_t+"</small>":"")+"</strong></span></div></div>";

  // Stats
  h+="<div class=\"stat-grid\">";
  h+="<div class=\"stat-box\"><div class=\"stat-lbl\">最低溢价</div><div class=\"stat-val\">"+b.vs_low+"</div></div>";
  h+="<div class=\"stat-box\"><div class=\"stat-lbl\">历史分位</div><div class=\"stat-val\">"+b.pct+"%</div></div>";
  h+="<div class=\"stat-box\"><div class=\"stat-lbl\">穿透伤害</div><div class=\"stat-val\">Lv"+b.pn+"/"+b.hr+"%</div></div>";
  h+="<div class=\"stat-box\"><div class=\"stat-lbl\">趋势判断</div><div class=\"stat-val\">"+(b.tr==="rising"?"📈":"📉")+" "+b.tr+"</div></div>";
  h+="</div>";

  // Confidence bar
  var confLevels={high:90,medium:60,low:30};
  var confPct=confLevels[b.conf]||50;
  h+="<div style=\"margin:8px 0\"><div style=\"font-size:9px;color:var(--muted);margin-bottom:3px\">预测置信度</div>";
  h+="<div style=\"background:var(--border);border-radius:4px;height:6px;overflow:hidden\">";
  h+="<div style=\"width:"+confPct+"%;height:100%;background:"+(confPct>=80?"var(--green)":confPct>=50?"var(--yellow)":"var(--red)")+";border-radius:4px\"></div></div></div>";

  // Suggestion
  if(b.sug){
    h+="<div class=\"section-title\">💡 交易建议</div>";
    h+="<div style=\"font-size:12px;line-height:1.7;color:var(--text);padding:8px 0\">"+b.sug+"</div>";
  }

  // Predicted range
  if(b.pr_r&&b.pr_r.min){
    h+="<div class=\"section-title\">🔮 价格预测 ("+b.conf+")</div>";
    h+="<div class=\"time-block\"><div class=\"time-row\"><span>预测区间</span><strong>¥"+fm(b.pr_r.min)+" ~ ¥"+fm(b.pr_r.max)+"</strong></div></div>";
  }

  // Best buy time
  var bt=b.bt;
  if(bt&&bt.views){
    h+="<div class=\"section-title\">⏰ 最佳购买时段</div>";
    var ov=bt.views.overall;
    var wd=bt.views.weekday;
    var we=bt.views.weekend;
    if(ov&&ov.time_range){
      h+="<div class=\"time-block\"><div style=\"font-size:10px;color:var(--muted);margin-bottom:4px\">🟢 综合时段</div>";
      h+="<div class=\"time-row\"><span>时段</span><strong>"+ov.time_range+"</strong></div>";
      h+="<div class=\"time-row\"><span>均价</span><strong>¥"+fm(ov.avg_price||0)+"</strong></div>";
      h+="<div class=\"time-row\"><span>可省</span><strong>"+(ov.savings_percent||0)+"%</strong></div>";
      h+="</div>";
    }
    if(wd&&wd.time_range){
      h+="<div class=\"time-block\"><div style=\"font-size:10px;color:var(--muted);margin-bottom:4px\">🔵 工作日</div>";
      h+="<div class=\"time-row\"><span>时段</span><strong>"+wd.time_range+"</strong></div>";
      if(wd.avg_price)h+="<div class=\"time-row\"><span>均价</span><strong>¥"+fm(wd.avg_price)+"</strong></div>";
      h+="</div>";
    }
    if(we&&we.time_range){
      h+="<div class=\"time-block\"><div style=\"font-size:10px;color:var(--muted);margin-bottom:4px\">🟣 周末</div>";
      h+="<div class=\"time-row\"><span>时段</span><strong>"+we.time_range+"</strong></div>";
      if(we.avg_price)h+="<div class=\"time-row\"><span>均价</span><strong>¥"+fm(we.avg_price)+"</strong></div>";
      h+="</div>";
    }
  }

  // Guns
  if(b.gl&&b.gl.length){
    h+="<div class=\"section-title\">🔫 可用枪械</div>";
    h+="<div class=\"gun-list\">";
    b.gl.forEach(function(g){h+="<span class=\"gun-tag\">"+g+"</span>"});
    h+="</div>";
  }

  // Materials
  if(b.ma&&b.ma.length){
    h+="<div class=\"section-title\">📦 军需处兑换材料</div>";
    b.ma.forEach(function(m){
      h+="<div class=\"time-block\">";
      h+="<div style=\"font-size:11px;font-weight:600;margin-bottom:4px\">"+m.n+"</div>";
      h+="<div class=\"mat-list\">";
      (m.ra||[]).forEach(function(r){h+="<span class=\"mat-tag\">"+r[0]+" ×"+r[1]+"</span>"});
      h+="</div></div>";
    });
  }

  document.getElementById("detailArea").innerHTML=h;
  // Sync price to calculator
  var inp=document.getElementById("buyPrice");
  if(inp&&!inp.value)inp.value=b.pr;
  calc();
}

function fGd(g){
  fG=g;
  document.querySelectorAll("#gradeFilter .filter-btn").forEach(function(b){
    b.classList.toggle("active",parseInt(b.dataset.grade)===g);
  });
  rL();
}

function fTd(t){
  fT=t;
  document.querySelectorAll("#trendFilter .filter-btn").forEach(function(b){
    b.classList.toggle("active",b.dataset.trend===t);
  });
  rL();
}

function filterBullets(){rL()}

function initGradeFilters(){
  document.querySelectorAll("#gradeFilter .filter-btn").forEach(function(b){
    b.onclick=function(){fGd(parseInt(this.dataset.grade))};
  });
}

function initTrendFilters(){
  document.querySelectorAll("#trendFilter .filter-btn").forEach(function(btn){
    btn.onclick=function(){fTd(this.dataset.trend)};
  });
}

function calc(){
  var bp=parseFloat(document.getElementById("buyPrice").value)||0;
  var sp=parseFloat(document.getElementById("sellPrice").value)||0;
  var qty=parseFloat(document.getElementById("qty").value)||0;
  var g=parseInt(document.getElementById("grade").value)||4;
  g=Math.max(1,Math.min(5,g));
  var feBuy=FR[g]||0.17;var feSell=FR[g]||0.17;
  var buyTotal=bp*qty;var buyFee=Math.round(buyTotal*feBuy);
  var sellTotal=sp*qty;var sellFee=Math.round(sellTotal*feSell);
  var cost=buyTotal+buyFee;var revenue=sellTotal-sellFee;
  var profit=revenue-cost;
  var rate=cost>0?(profit/cost*100).toFixed(1):0;
  document.getElementById("rBuyTotal").textContent="¥"+fm(buyTotal);
  document.getElementById("rBuyFee").textContent="¥"+fm(buyFee);
  document.getElementById("rSellTotal").textContent="¥"+fm(sellTotal);
  document.getElementById("rSellFee").textContent="¥"+fm(sellFee);
  document.getElementById("rProfit").textContent=(profit>=0?"":"-")+"¥"+fm(Math.abs(profit));
  document.getElementById("rRate").textContent=rate+"%";
  // Color the profit
  var el=document.getElementById("rProfit");
  el.style.color=profit>=0?"var(--green)":"var(--red)";
}

function toggleTheme(){
  isL=!isL;
  document.documentElement.classList.toggle("light",isL);
  document.getElementById("themeBtn").textContent=isL?"☀️":"🌙";
  localStorage.setItem("theme",isL?"light":"dark");
  fixColors();
}

function fixColors(){
  var els=document.querySelectorAll(".search-box input,.stat-box,.time-block,.input-row");
  if(isL){
    els.forEach(function(el){el.style.background="var(--card)"});
  }else{
    els.forEach(function(el){el.style.background="var(--bg)"});
  }
}

function refreshData(){
  document.getElementById("statusText").textContent="刷新中...";
  document.getElementById("updateTime").textContent=new Date().toLocaleTimeString("zh-CN");
  showToast("🔄 正在刷新数据...");
  setTimeout(function(){document.getElementById("statusText").textContent="实时数据";rL();showToast("✅ 数据已刷新")},800);
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(timer);
  timer=setTimeout(function(){t.classList.remove("show")},2000);
}

// Init
document.addEventListener("DOMContentLoaded",function(){
  initGradeFilters();
  initTrendFilters();
  rL();
  calc();
  document.getElementById("updateTime").textContent=new Date().toLocaleTimeString("zh-CN");
  var saved=localStorage.getItem("theme");
  if(saved==="light"){isL=true;document.documentElement.classList.add("light");fixColors();document.getElementById("themeBtn").textContent="☀️";}
  // Keyboard shortcut
  document.addEventListener("keydown",function(e){
    if(e.key==="Escape"){idx=-1;rL();document.getElementById("detailArea").innerHTML="<div style=\"text-align:center;color:var(--muted);padding:40px\">👈 选择左侧子弹查看数据详情<br>含今日高低价、最佳购买时段、可用枪械</div>"}
  });
});

</script>
