<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动 · 子弹交易助手 V6</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--accent:#3b82f6;--gold:#f59e0b;--purple:#a855f7;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--border:#334155;}
:root.light{--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--muted:#64748b;--accent:#2563eb;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:16px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.header h1{font-size:20px;display:flex;align-items:center;gap:8px}
.header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-secondary{background:var(--border);color:var(--text)}
.status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.status-dot.offline{background:var(--red)}
#liveClock{font-size:13px;color:var(--muted);font-family:monospace}
.tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:8px}
.tab{padding:10px 20px;border-radius:8px 8px 0 0;cursor:pointer;background:transparent;border:none;color:var(--muted);font-size:14px;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.main-layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}}
.sidebar{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;height:fit-content;max-height:calc(100vh - 200px);overflow-y:auto;position:sticky;top:16px}
.search-box{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin-bottom:12px;font-size:13px}
.filter-group{margin-bottom:12px}
.filter-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.filter-btns{display:flex;flex-wrap:wrap;gap:6px}
.filter-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.bullet-list{display:flex;flex-direction:column;gap:8px}
.bullet-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:var(--bg);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.bullet-item:hover{background:var(--border)}
.bullet-item.active{background:rgba(59,130,246,.15);border-left-color:var(--accent)}
.bullet-item img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.bullet-info{flex:1;min-width:0}
.bullet-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bullet-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.bullet-price{font-size:14px;font-weight:700;color:var(--gold)}
.bullet-price.down{color:var(--green)}
.bullet-price.up{color:var(--red)}
.grade-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.trend-icon{font-size:12px}
.detail-panel{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-header img{width:64px;height:64px;border-radius:12px;object-fit:cover}
.detail-title h2{font-size:20px;margin-bottom:4px}
.detail-title .meta{display:flex;gap:12px;align-items:center;color:var(--muted);font-size:13px}
.hero-price{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.price-card{background:var(--bg);padding:16px;border-radius:10px;text-align:center;border:1px solid var(--border)}
.price-card .label{font-size:12px;color:var(--muted);margin-bottom:4px}
.price-card .value{font-size:22px;font-weight:700;color:var(--gold)}
.price-card .change{font-size:12px;margin-top:4px}
.price-card .change.up{color:var(--red)}
.price-card .change.down{color:var(--green)}
.section{margin-bottom:20px}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:18px;background:var(--accent);border-radius:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.stat-card{background:var(--bg);padding:14px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.stat-card .stat-name{font-size:13px;color:var(--muted)}
.stat-card .stat-value{font-size:16px;font-weight:700;color:var(--accent)}
.stat-card .stat-badge{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;color:#fff;background:var(--blue)}
.gun-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.gun-card{background:var(--bg);padding:12px;border-radius:10px;border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .2s}
.gun-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.gun-card img{width:60px;height:60px;object-fit:contain;margin-bottom:8px;border-radius:6px}
.gun-card .gun-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.material-card{background:var(--bg);padding:16px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px}
.material-card .mat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.material-card .mat-header img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.material-card .mat-title{font-size:14px;font-weight:700}
.material-card .mat-subtitle{font-size:12px;color:var(--muted)}
.material-items{display:flex;flex-wrap:wrap;gap:10px}
.mat-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.mat-item img{width:32px;height:32px;border-radius:6px;object-fit:cover}
.mat-item .mat-name{font-size:12px}
.mat-item .mat-count{font-size:11px;color:var(--muted)}
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.similar-card{background:var(--bg);padding:12px;border-radius:10px;border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .2s}
.similar-card:hover{border-color:var(--accent)}
.similar-card img{width:48px;height:48px;object-fit:cover;border-radius:8px;margin-bottom:8px}
.similar-card .sim-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.similar-card .sim-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:4px}
.calc-layout{display:grid;grid-template-columns:300px 1fr;gap:16px}
@media(max-width:900px){.calc-layout{grid-template-columns:1fr}}
.calc-card{background:var(--bg);padding:20px;border-radius:12px;border:1px solid var(--border)}
.calc-card h3{margin-bottom:16px;font-size:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px}
.calc-result{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}
.result-card{background:var(--card);padding:14px;border-radius:10px;border:1px solid var(--border);text-align:center}
.result-card .res-label{font-size:12px;color:var(--muted)}
.result-card .res-value{font-size:20px;font-weight:700;margin-top:4px}
.result-card.profit .res-value{color:var(--green)}
.result-card.loss .res-value{color:var(--red)}
.watch-list{display:flex;flex-direction:column;gap:10px}
.watch-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.watch-item.alert{border-color:var(--red);background:rgba(239,68,68,.1)}
.watch-info{flex:1}
.watch-name{font-size:14px;font-weight:600}
.watch-target{font-size:12px;color:var(--muted)}
.watch-current{font-size:16px;font-weight:700;color:var(--gold)}
.watch-actions{display:flex;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);color:var(--text);padding:12px 24px;border-radius:10px;border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0,.3);opacity:0;transition:all .3s;z-index:1000;font-size:14px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎯 三角洲行动 · 子弹交易助手 <span style="color:var(--accent)">V6</span></h1>
    <div class="header-actions">
      <span id="liveClock">--:--:--</span>
      <span class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">实时数据</span></span>
      <button class="btn" onclick="refreshData()">🔄 刷新</button>
      <button class="btn btn-secondary" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('timing')">📊 子弹时机</button>
    <button class="tab" onclick="switchTab('calc')">🧮 收益计算</button>
    <button class="tab" onclick="switchTab('watch')">🔔 价格监控</button>
  </div>
  <div id="tab-timing" class="tab-content">
    <div class="main-layout">
      <div class="sidebar">
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索子弹名称..." oninput="filterBullets()">
        <div class="filter-group">
          <div class="filter-label">等级筛选</div>
          <div class="filter-btns" id="gradeFilters">
            <button class="filter-btn active" onclick="setGradeFilter('all')">全部</button>
            <button class="filter-btn" onclick="setGradeFilter(5)">五级</button>
            <button class="filter-btn" onclick="setGradeFilter(4)">四级</button>
            <button class="filter-btn" onclick="setGradeFilter(3)">三级</button>
            <button class="filter-btn" onclick="setGradeFilter(2)">二级</button>
            <button class="filter-btn" onclick="setGradeFilter(1)">一级</button>
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-label">趋势筛选</div>
          <div class="filter-btns" id="trendFilters">
            <button class="filter-btn active" onclick="setTrendFilter('all')">全部</button>
            <button class="filter-btn" onclick="setTrendFilter('rising')">📈 上涨</button>
            <button class="filter-btn" onclick="setTrendFilter('falling')">📉 下跌</button>
            <button class="filter-btn" onclick="setTrendFilter('stable')">➡️ 平稳</button>
          </div>
        </div>
        <div class="bullet-list" id="bulletList"></div>
      </div>
      <div class="detail-panel" id="detailPanel">
        <div style="text-align:center;color:var(--muted);padding:60px 20px">
          <div style="font-size:48px;margin-bottom:16px">🎯</div>
          <div style="font-size:16px">选择左侧子弹查看详情</div>
          <div style="font-size:13px;margin-top:8px">实时价格 · 涨跌分析 · 购买建议</div>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-calc" class="tab-content" style="display:none">
    <div class="calc-layout">
      <div class="sidebar">
        <input type="text" class="search-box" id="calcSearchBox" placeholder="🔍 搜索子弹..." oninput="filterCalcBullets()">
        <div class="filter-group">
          <div class="filter-label">子弹类型</div>
          <div class="filter-btns">
            <button class="filter-btn active" onclick="setCalcType('all')">全部</button>
            <button class="filter-btn" onclick="setCalcType('rifle')">步枪</button>
            <button class="filter-btn" onclick="setCalcType('sniper')">狙击</button>
            <button class="filter-btn" onclick="setCalcType('smg')">冲锋枪</button>
            <button class="filter-btn" onclick="setCalcType('pistol')">手枪</button>
          </div>
        </div>
        <div class="bullet-list" id="calcBulletList"></div>
      </div>
      <div>
        <div class="calc-card">
          <h3>🧮 收益计算器</h3>
          <div id="calcSelected" style="margin-bottom:16px;padding:12px;background:var(--card);border-radius:8px;display:none">
            <div style="display:flex;align-items:center;gap:10px">
              <img id="calcPic" src="" style="width:48px;height:48px;border-radius:8px">
              <div>
                <div id="calcName" style="font-weight:700"></div>
                <div id="calcGrade" style="font-size:12px;color:var(--muted)"></div>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>买入单价</label>
            <input type="number" id="buyPrice" placeholder="输入买入价格" oninput="calculate()">
          </div>
          <div class="form-group">
            <label>卖出单价</label>
            <input type="number" id="sellPrice" placeholder="输入卖出价格" oninput="calculate()">
          </div>
          <div class="form-group">
            <label>数量</label>
            <input type="number" id="quantity" value="1" min="1" oninput="calculate()">
          </div>
          <div class="calc-result" id="calcResult"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-watch" class="tab-content" style="display:none">
    <div style="max-width:800px;margin:0 auto">
      <div class="calc-card" style="margin-bottom:16px">
        <h3>➕ 添加监控</h3>
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:end">
          <div class="form-group" style="margin-bottom:0">
            <label>选择子弹</label>
            <select id="watchBulletSelect"></select>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>目标价格</label>
            <input type="number" id="watchTarget" placeholder="抄底价">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>类型</label>
            <select id="watchType"><option value="buy">抄底买入</option><option value="sell">高位卖出</option></select>
          </div>
          <button class="btn" onclick="addWatch()">添加</button>
        </div>
      </div>
      <div class="watch-list" id="watchList"></div>
      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-secondary" onclick="requestNotification()">🔔 开启桌面通知</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="_v6_app.js"></script>
</body>
</html>
