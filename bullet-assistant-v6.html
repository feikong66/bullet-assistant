<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动 · 子弹交易助手 V6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060c18;--card:#0f1923;--border:#1e2d40;--text:#dde6ef;--muted:#5a6d7e;--bg2:#070e18;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;}
:root.light{--bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--bg2:#f8fafc;}
html,body{height:100%;font-family:system-ui,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);}
.app{max-width:1400px;margin:0 auto;padding:10px;display:grid;grid-template-columns:320px 1fr;gap:10px;min-height:100vh;}
@media(max-width:900px){.app{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.header h1{font-size:19px;background:linear-gradient(135deg,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.btn{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:5px;color:var(--blue);padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;}
.btn:hover{background:rgba(59,130,246,0.22);}
.btn-sm{font-size:10px;padding:3px 8px;}
.theme-btn{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;padding:0;}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:4px;}
.tab-btn{padding:5px 14px;border-radius:7px 7px 0 0;border:1px solid transparent;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-weight:500;}
.tab-btn.active{background:var(--card);border:1px solid var(--border);border-bottom-color:var(--card);color:var(--blue);position:relative;z-index:1;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.search-box input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;}
.search-box input:focus{border-color:var(--blue);}
.filter-row{display:flex;flex-wrap:wrap;gap:3px;}
.filter-btn{padding:2px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;}
.filter-btn.active{border-color:var(--blue);background:rgba(59,130,246,0.1);color:var(--blue);}
.bullet-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;max-height:calc(100vh - 270px);}
.bullet-item{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.bullet-item:hover{background:rgba(59,130,246,0.06);border-color:var(--border);}
.bullet-item.active{background:rgba(59,130,246,0.1);border-color:var(--blue);}
.bullet-left{display:flex;align-items:center;gap:7px;}
.bullet-name{font-size:11px;font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bullet-grade{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0;}
.bullet-price{font-size:11px;color:var(--yellow);font-family:"Courier New",monospace;font-weight:600;}
.bullet-change{font-size:8px;margin-left:3px;}
.up{color:var(--green);}.dn{color:var(--red);}

/* DETAIL */
.price-hero{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.04));border:1px solid rgba(59,130,246,0.18);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.price-main{font-size:26px;font-weight:900;color:var(--yellow);font-family:"Courier New",monospace;}
.price-label{font-size:10px;color:var(--muted);}
.price-range{display:flex;gap:14px;font-size:11px;}
.price-range>div{display:flex;flex-direction:column;align-items:center;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px;text-align:center;}
.stat-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;}
.stat-val{font-size:13px;font-weight:700;font-family:"Courier New",monospace;}
.g{color:var(--green);}.r{color:var(--red);}.y{color:var(--yellow);}

/* CHART */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px;}
.chart-wrap canvas{width:100%;height:180px;display:block;}

/* SECTIONS */
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:8px 0 6px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:"";flex:1;height:1px;background:var(--border);}
.time-block{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:6px;}
.time-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.time-row span{color:var(--muted);}
.time-row strong{color:var(--green);font-family:"Courier New",monospace;}
.gun-list,.mat-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.gun-tag{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.18);border-radius:3px;padding:2px 7px;font-size:9px;color:var(--blue);}
.mat-tag{background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.18);border-radius:3px;padding:2px 7px;font-size:9px;color:var(--purple);}

/* CALCULATOR */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
@media(max-width:600px){.calc-grid{grid-template-columns:1fr;}}
.calc-grid-3{grid-template-columns:1fr 1fr 1fr;}
.input-group{margin-bottom:6px;}
.input-label{display:block;font-size:10px;color:var(--muted);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;}
.input-row{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.input-row input,.input-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;padding:6px 8px;font-family:"Courier New",monospace;}
.input-row select{font-family:inherit;cursor:pointer;}
.input-row .unit{padding:0 7px;font-size:10px;color:var(--muted);border-left:1px solid var(--border);white-space:nowrap;}
.result-box{background:linear-gradient(135deg,rgba(16,185,129,0.06),rgba(59,130,246,0.03));border:1px solid rgba(16,185,129,0.15);border-radius:7px;padding:10px 12px;}
.result-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.result-row span{color:var(--muted);}
.result-row strong{font-family:"Courier New",monospace;}
.result-row.profit strong{color:var(--green);font-size:14px;}

/* MONITOR */
.monitor-item{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.monitor-info{font-size:11px;}
.monitor-name{font-weight:600;}
.monitor-target{color:var(--yellow);font-family:"Courier New",monospace;}
.monitor-status{font-size:10px;padding:2px 6px;border-radius:3px;}
.monitor-actions{display:flex;gap:4px;}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;}
.badge-on{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
.badge-off{background:rgba(107,114,128,0.1);color:var(--muted);border:1px solid rgba(107,114,128,0.2);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 15px;font-size:12px;z-index:1001;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{opacity:1;}

/* EMPTY STATE */
.empty{text-align:center;color:var(--muted);padding:40px;font-size:13px;}

/* SCROLLBAR */
.bullet-list::-webkit-scrollbar{width:4px;}
.bullet-list::-webkit-scrollbar-track{background:transparent;}
.bullet-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

<div class="app">
  <div class="header">
    <h1>🎯 三角洲行动 · 子弹交易助手 V6</h1>
    <div class="status-bar">
      <span class="status-dot"></span>
      <span id="statusText">就绪</span>
      <span id="updateTime">-</span>
      <button class="btn btn-sm" onclick="refreshData()">🔄 刷新</button>
      <button class="btn theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="sidebar card">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索子弹名称..." oninput="filterBullets()">
    </div>
    <div class="filter-row" id="gradeFilter">
      <button class="filter-btn active" data-grade="0">全部</button>
      <button class="filter-btn" data-grade="5">五级</button>
      <button class="filter-btn" data-grade="4">四级</button>
      <button class="filter-btn" data-grade="3">三级</button>
      <button class="filter-btn" data-grade="2">二级</button>
      <button class="filter-btn" data-grade="1">一级</button>
    </div>
    <div class="filter-row" id="trendFilter">
      <button class="filter-btn active" data-trend="">全部趋势</button>
      <button class="filter-btn" data-trend="rising">📈 上涨</button>
      <button class="filter-btn" data-trend="falling">📉 下跌</button>
    </div>
    <div class="bullet-list" id="bulletList"></div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="detail" id="tabDetail">📊 行情详情</button>
      <button class="tab-btn" data-tab="calc" id="tabCalc">🧮 收益计算</button>
      <button class="tab-btn" data-tab="monitor" id="tabMonitor">🔔 价格监控</button>
    </div>
    <div class="tab-content active" id="tabContent_detail">
      <div id="detailArea">
        <div class="empty">👈 点击左侧子弹查看行情详情<br><span style="font-size:11px">含实时价格、涨跌幅、最佳购买时段、走势图</span></div>
      </div>
    </div>
    <div class="tab-content" id="tabContent_calc">
      <div class="card">
        <div class="section-title">🧮 收益计算器</div>
        <div class="calc-grid">
          <div class="input-group">
            <label class="input-label">子弹类型</label>
            <div class="input-row"><select id="calcBullet" onchange="onCalcBullet()"><option value="">手动输入</option></select></div>
          </div>
          <div class="input-group">
            <label class="input-label">品级（手续费率）</label>
            <div class="input-row"><select id="calcGrade" onchange="calc()"><option value="1">一级 · 10%</option><option value="2">二级 · 10%</option><option value="3">三级 · 13%</option><option value="4" selected>四级 · 17%</option><option value="5">五级 · 20%</option></select></div>
          </div>
          <div class="input-group">
            <label class="input-label">买入单价</label>
            <div class="input-row"><input type="number" id="buyPrice" oninput="calc()" placeholder="0"><span class="unit">¥</span></div>
          </div>
          <div class="input-group">
            <label class="input-label">卖出单价</label>
            <div class="input-row"><input type="number" id="sellPrice" oninput="calc()" placeholder="0"><span class="unit">¥</span></div>
          </div>
          <div class="input-group">
            <label class="input-label">交易数量</label>
            <div class="input-row"><input type="number" id="qty" oninput="calc()" value="100"><span class="unit">发</span></div>
          </div>
        </div>
        <div class="result-box" id="calcResult">
          <div class="result-row"><span>买入总价</span><strong id="rBuyTotal">¥0</strong></div>
          <div class="result-row"><span>买入手续费</span><strong id="rBuyFee">¥0</strong></div>
          <div class="result-row"><span>卖出总收入</span><strong id="rSellTotal">¥0</strong></div>
          <div class="result-row"><span>卖出手续费</span><strong id="rSellFee">¥0</strong></div>
          <div class="result-row profit"><span>净利润</span><strong id="rProfit">¥0</strong></div>
          <div class="result-row"><span>利润率</span><strong id="rRate">0%</strong></div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tabContent_monitor">
      <div class="card">
        <div class="section-title">🔔 价格监控 <span id="monitorCount" style="font-size:10px;color:var(--muted)">已添加 0 个监控</span></div>
        <div id="monitorList">
          <div class="empty">暂无监控<br><span style="font-size:11px">点击行情详情页 +添加监控 来设置价格提醒</span></div>
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);">
          <span id="notifStatus" class="badge badge-off">通知: 未授权</span>
          <button class="btn btn-sm" onclick="requestNotif()">🔔 开启浏览器通知</button>
        </div>
      </div>
    </div>
  </div>
</div>

var FEE_RATES={1:.1,2:.1,3:.13,4:.17,5:.2};
var GRADE_COLORS={5:"#f59e0b",4:"#a855f7",3:"#3b82f6",2:"#10b981",1:"#6b7280"};
var GRADE_NAMES={5:"五级",4:"四级",3:"三级",2:"二级",1:"一级"};
var selected=null,gradeFilter=0,trendFilter="",currentTab="detail";
var monitors=[];
var notifGranted=false;
var LAST_MN={};

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ====== INIT ======
function init(){
  bindFilters("#gradeFilter",function(v){gradeFilter=v;renderList();});
  bindFilters("#trendFilter",function(v){trendFilter=v;renderList();});
  document.querySelectorAll(".tab-btn").forEach(function(b){
    b.addEventListener("click",function(){switchTab(this.dataset.tab);});
  });
  loadMonitors();
  checkNotif();
  renderList();
  buildCalcBulletSelect();
  updateTime();
  if(localStorage.getItem("theme")==="light") toggleTheme();
  setInterval(function(){checkMonitors();updateTime();},30000);
}

function bindFilters(id,cb){
  var val=0;
  document.querySelectorAll(id+" .filter-btn").forEach(function(b){
    b.addEventListener("click",function(){
      var d=this.dataset;
      val=d.grade?parseInt(d.grade):0;
      if(d.trend!==undefined) val=d.trend;
      document.querySelectorAll(id+" .filter-btn").forEach(function(x){x.classList.remove("active");});
      this.classList.add("active");
      cb(val);
    });
  });
}

function updateTime(){
  document.getElementById("updateTime").textContent=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

// ====== THEME ======
function toggleTheme(){
  var isLight=document.documentElement.classList.toggle("light");
  document.getElementById("themeBtn").textContent=isLight?"☀️":"🌙";
  localStorage.setItem("theme",isLight?"light":"dark");
  if(selected) drawChart();
}

// ====== TABS ======
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab);});
  document.querySelectorAll(".tab-content").forEach(function(c){c.classList.toggle("active",c.id==="tabContent_"+tab);});
  if(tab==="calc") buildCalcBulletSelect();
  if(tab==="monitor") renderMonitors();
}

// ====== BULLET LIST ======
function trendIcon(t){
  if(t==="rising") return "📈";
  if(t==="falling") return "📉";
  return "➡️";
}

function renderList(){
  var s=document.getElementById("searchInput").value.toLowerCase();
  var list=BULLETS.filter(function(b){
    if(gradeFilter&&b.grade!==gradeFilter) return false;
    if(trendFilter&&b.trend!==trendFilter) return false;
    if(s&&b.name.toLowerCase().indexOf(s)===-1) return false;
    return true;
  });
  var h="";
  for(var i=0;i<list.length;i++){
    var b=list[i];
    var d3=b.d3?parseFloat(b.d3)*100:0;
    var cls=d3>0?"up":d3<0?"dn":"";
    var ct=d3?((d3>0?"+":"")+d3.toFixed(1)+"%"):"";
    var ac=selected&&selected.id===b.id?" active":"";
    h+="<div class=\x27bullet-item"+ac+"\x27 data-id=\x27"+b.id+"\x27>";
    h+="<div class=\x27bullet-left\x27><span class=\x27bullet-name\x27>"+esc(b.name)+"</span>";
    h+="<span class=\x27bullet-grade\x27 style=\x27background:"+(GRADE_COLORS[b.grade]||"#6b7280")+"20;color:"+(GRADE_COLORS[b.grade]||"#6b7280")+"\x27>"+(GRADE_NAMES[b.grade]||b.grade+"级")+"</span></div>";
    h+="<div><span class=\x27bullet-price\x27>¥"+(b.price||"-")+"</span>";
    if(ct) h+="<span class=\x27bullet-change "+cls+"\x27>"+ct+"</span>";
    h+="</div></div>";
  }
  document.getElementById("bulletList").innerHTML=h;
  document.querySelectorAll(".bullet-item").forEach(function(el){
    el.addEventListener("click",function(){selectBullet(this.dataset.id);switchTab("detail");document.getElementById("tabDetail").click();});
  });
}

function filterBullets(){renderList();}

function selectBullet(id){
  selected=BULLETS.find(function(b){return b.id===id;});
  if(!selected){renderList();return;}
  renderList();
  renderDetail();
}

// ====== DETAIL ======
function renderDetail(){
  if(!selected) return;
  var b=selected;
  var d3=b.d3?parseFloat(b.d3)*100:0;
  var d7=b.d7?parseFloat(b.d7)*100:0;
  var d30=b.d30?parseFloat(b.d30)*100:0;
  var views=b.bt&&b.bt.views;
  var ov=views&&views.overall;
  var wd=views&&views.weekday;
  var we=views&&views.weekend;
  var guns=b.guns||[];
  var mats=b.mats||[];
  var uniqueGuns=[];
  for(var i=0;i<guns.length;i++){if(uniqueGuns.indexOf(guns[i])===-1) uniqueGuns.push(guns[i]);}
  var h="";
  // Price hero
  h+="<div class=\x27price-hero\x27>";
  h+="<div><div class=\x27price-label\x27>当前价格</div><div class=\x27price-main\x27>¥"+(b.price||"-")+"</div></div>";
  h+="<div class=\x27price-range\x27>";
  h+="<div>今日最低<span style=\x27color:var(--green);font-weight:700\x27>¥"+(b.min||"-")+"</span></div>";
  h+="<div>今日最高<span style=\x27color:var(--red);font-weight:700\x27>¥"+(b.max||"-")+"</span></div>";
  h+="</div>";
  h+="<div style=\x27font-size:24px\x27>"+trendIcon(b.trend)+"</div>";
  h+="</div>";
  // Stats
  h+="<div class=\x27stat-grid\x27>";
  h+="<div class=\x27stat-box\x27><div class=\x27stat-lbl\x27>3日涨幅</div><div class=\x27stat-val "+(d3>=0?"g":"r")+"\x27>"+(d3>0?"+":"")+d3.toFixed(1)+"%</div></div>";
  h+="<div class=\x27stat-box\x27><div class=\x27stat-lbl\x27>7日涨幅</div><div class=\x27stat-val "+(d7>=0?"g":"r")+"\x27>"+(d7>0?"+":"")+d7.toFixed(1)+"%</div></div>";
  h+="<div class=\x27stat-box\x27><div class=\x27stat-lbl\x27>30日涨幅</div><div class=\x27stat-val "+(d30>=0?"g":"r")+"\x27>"+(d30>0?"+":"")+d30.toFixed(1)+"%</div></div>";
  h+="<div class=\x27stat-box\x27><div class=\x27stat-lbl\x27>穿透等级</div><div class=\x27stat-val y\x27>"+(b.pen||"-")+"</div></div>";
  h+="</div>";
  // Chart canvas
  h+="<div class=\x27chart-wrap\x27><canvas id=\x27priceChart\x27></canvas></div>";
  // Best time
  var hasBt=ov&&ov.time_range;
  if(hasBt){
    h+="<div class=\x27section-title\x27>⏰ 最佳购买时段</div>";
    h+="<div class=\x27time-block\x27>";
    h+="<div class=\x27time-row\x27><span>综合时段</span><strong>"+esc(ov.time_range)+"</strong></div>";
    h+="<div class=\x27time-row\x27><span>综合均价</span><strong>¥"+ov.avg_price+"</strong></div>";
    h+="<div class=\x27time-row\x27 style=\x27font-size:9px;color:var(--muted)\x27>"+esc(ov.confidence_text||"")+"</div>";
    h+="</div>";
    if(wd&&wd.time_range){
      h+="<div class=\x27time-block\x27>";
      h+="<div class=\x27time-row\x27><span>工作日最佳</span><strong>"+esc(wd.time_range)+"</strong></div>";
      h+="<div class=\x27time-row\x27><span>工作日均价</span><strong>¥"+wd.avg_price+"</strong></div>";
      h+="</div>";
    }
    if(we&&we.time_range){
      h+="<div class=\x27time-block\x27>";
      h+="<div class=\x27time-row\x27><span>周末最佳</span><strong>"+esc(we.time_range)+"</strong></div>";
      h+="<div class=\x27time-row\x27><span>周末均价</span><strong>¥"+we.avg_price+"</strong></div>";
      h+="</div>";
    }
  }
  // Guns
  if(uniqueGuns.length>0){
    h+="<div class=\x27section-title\x27>🔫 适用枪械 ("+uniqueGuns.length+"款)</div><div class=\x27gun-list\x27>";
    for(var i=0;i<uniqueGuns.length;i++) h+="<span class=\x27gun-tag\x27>"+esc(uniqueGuns[i])+"</span>";
    h+="</div>";
  }
  // Mats
  if(mats.length>0){
    h+="<div class=\x27section-title\x27>📦 可兑换材料</div><div class=\x27mat-list\x27>";
    for(var i=0;i<Math.min(mats.length,12);i++) h+="<span class=\x27mat-tag\x27>"+esc(mats[i])+"</span>";
    h+="</div>";
  }
  // Add monitor button
  h+="<div style=\x27margin-top:12px;text-align:center\x27>";
  h+="<button class=\x27btn\x27 onclick=\x27addMonitorFromSelected()\x27>🔔 添加价格监控</button>";
  h+="</div>";
  document.getElementById("detailArea").innerHTML=h;
  setTimeout(drawChart,50);
}

// ====== CHART ======
function drawChart(){
  var c=document.getElementById("priceChart");
  if(!c) return;
  var b=selected;
  if(!b) return;
  var dpr=window.devicePixelRatio||1;
  var w=c.parentElement.clientWidth-20;
  var h=180;
  c.width=w*dpr; c.height=h*dpr;
  c.style.width=w+"px"; c.style.height=h+"px";
  var ctx=c.getContext("2d");
  ctx.scale(dpr,dpr);
  var isLight=document.documentElement.classList.contains("light");
  var fg=isLight?"#1e293b":"#dde6ef";
  var mg=isLight?"#94a3b8":"#5a6d7e";
  var gr=isLight?"#e2e8f0":"#1e2d40";
  var pad={t:30,r:20,b:40,l:60};
  var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  if(cw<=0||ch<=0) return;
  // --- Today's range gauge (top half) ---
  var mn=parseFloat(b.min)||0,mx=parseFloat(b.max)||0,pr=parseFloat(b.price)||0;
  if(mx>0&&mn>0&&mx>mn){
    var gy=pad.t+5,gh=Math.floor(ch*.45);
    // Range bar
    var rw=cw-10;
    var rx=pad.l+5;
    var ry=gy+25;
    var rh=14;
    var grad=ctx.createLinearGradient(rx,0,rx+rw,0);
    grad.addColorStop(0,"#10b981");
    grad.addColorStop(.5,"#f59e0b");
    grad.addColorStop(1,"#ef4444");
    ctx.fillStyle=grad;
    roundedRect(ctx,rx,ry,rw,rh,7);
    ctx.fill();
    // Price marker
    var pct=(pr-mn)/(mx-mn);
    var px=rx+pct*rw;
    ctx.beginPath(); ctx.moveTo(px,ry-6); ctx.lineTo(px-5,ry-14); ctx.lineTo(px+5,ry-14); ctx.closePath();
    ctx.fillStyle="#fff"; ctx.fill();
    ctx.fillStyle=fg; ctx.font="bold 11px system-ui"; ctx.textAlign="center";
    ctx.fillText("¥"+pr,px,ry-18);
    // Labels
    ctx.fillStyle=mg; ctx.font="9px system-ui"; ctx.textAlign="left";
    ctx.fillText("¥"+mn,rx,ry-2);
    ctx.textAlign="right";
    ctx.fillText("¥"+mx,rx+rw,ry-2);
    ctx.textAlign="center";
    ctx.fillStyle=mg; ctx.font="bold 10px system-ui";
    ctx.fillText("今日价格区间 (最低 → 最高)",rx+rw/2,gy+8);
  }
  // --- 3/7/30 day change bars (bottom half) ---
  var d3=b.d3?parseFloat(b.d3)*100:0;
  var d7=b.d7?parseFloat(b.d7)*100:0;
  var d30=b.d30?parseFloat(b.d30)*100:0;
  var maxAbs=Math.max(Math.abs(d3),Math.abs(d7),Math.abs(d30),1);
  var by=h-pad.b-5,bh=ch*.45;
  var items=[{l:"3日",v:d3},{l:"7日",v:d7},{l:"30日",v:d30}];
  var barW=Math.min(Math.floor(cw/items.length*.5),28);
  var gap=(cw-items.length*barW)/(items.length+1);
  var bx=pad.l+gap;
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var hh=Math.abs(it.v)/maxAbs*bh;
    if(hh<2) hh=2;
    var by0=it.v>=0?by-hh:by;
    ctx.fillStyle=it.v>=0?"#10b981":"#ef4444";
    roundedRect(ctx,bx,by0,barW,hh,4);
    ctx.fill();
    // Label below
    ctx.fillStyle=fg; ctx.font="bold 10px system-ui"; ctx.textAlign="center";
    ctx.fillText((it.v>=0?"+":"")+it.v.toFixed(1)+"%",bx+barW/2,it.v>=0?by0-8:by0+hh+16);
    ctx.fillStyle=mg; ctx.font="9px system-ui";
    ctx.fillText(it.l,bx+barW/2,h-pad.b+5);
    bx+=barW+gap;
  }
  // Zero line
  ctx.strokeStyle=gr; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,by); ctx.lineTo(pad.l+cw,by); ctx.stroke();
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ====== CALCULATOR ======
function buildCalcBulletSelect(){
  var sel=document.getElementById("calcBullet");
  if(!sel) return;
  var cur=sel.value;
  sel.innerHTML="<option value=\x27\x27>手动输入</option>";
  for(var i=0;i<BULLETS.length;i++){
    var b=BULLETS[i];
    var gname=GRADE_NAMES[b.grade]||b.grade+"级";
    sel.innerHTML+="<option value=\x27"+b.id+"\x27>"+esc(b.name)+" ["+gname+" ¥"+b.price+"]</option>";
  }
  sel.value=cur;
  if(!cur&&selected) sel.value=selected.id;
}

function onCalcBullet(){
  var id=document.getElementById("calcBullet").value;
  if(!id){calc();return;}
  var b=BULLETS.find(function(x){return x.id===id;});
  if(!b){calc();return;}
  document.getElementById("buyPrice").value=b.price||"";
  document.getElementById("calcGrade").value=b.grade||4;
  calc();
}

function calc(){
  var buy=parseFloat(document.getElementById("buyPrice").value)||0;
  var sell=parseFloat(document.getElementById("sellPrice").value)||0;
  var qty=parseInt(document.getElementById("qty").value)||0;
  var grade=parseInt(document.getElementById("calcGrade").value)||4;
  var fee=FEE_RATES[grade]||.17;
  var buyTotal=buy*qty;
  var buyFee=Math.floor(buyTotal*fee);
  var cost=buyTotal+buyFee;
  var sellTotal=sell*qty;
  var sellFee=Math.floor(sellTotal*fee);
  var profit=sellTotal-sellFee-cost;
  var rate=cost>0?(profit/cost*100).toFixed(1):0;
  document.getElementById("rBuyTotal").textContent="¥"+buyTotal.toLocaleString();
  document.getElementById("rBuyFee").textContent="¥"+buyFee.toLocaleString();
  document.getElementById("rSellTotal").textContent="¥"+sellTotal.toLocaleString();
  document.getElementById("rSellFee").textContent="¥"+sellFee.toLocaleString();
  document.getElementById("rProfit").textContent=(profit>=0?"+":"")+"¥"+profit.toLocaleString();
  document.getElementById("rProfit").style.color=profit>=0?"var(--green)":"var(--red)";
  document.getElementById("rRate").textContent=rate+"%";
  document.getElementById("rRate").style.color=profit>=0?"var(--green)":"var(--red)";
}

// ====== MONITOR & NOTIFICATIONS ======
function addMonitorFromSelected(){
  if(!selected) return;
  var id=selected.id;
  // Check dup
  for(var i=0;i<monitors.length;i++){if(monitors[i].bulletId===id){showToast("⚠️ 已添加过该子弹的监控");return;}}
  monitors.push({
    bulletId:id,
    name:selected.name,
    grade:selected.grade,
    targetBuy:selected.price?Math.floor(selected.price*.9):0,
    targetSell:selected.price?Math.floor(selected.price*1.15):0,
    lastPrice:selected.price||0,
    enabled:true,
    alertedAt:0
  });
  saveMonitors();
  showToast("✅ 已为 "+selected.name+" 添加价格监控");
  renderMonitors();
}

function removeMonitor(idx){
  var m=monitors[idx];
  monitors.splice(idx,1);
  saveMonitors();
  showToast("🗑️ 已移除 "+m.name+" 监控");
  renderMonitors();
}

function toggleMonitor(idx){
  monitors[idx].enabled=!monitors[idx].enabled;
  saveMonitors();
  renderMonitors();
}

function updateMonitorTarget(idx,field,val){
  monitors[idx][field]=parseInt(val)||0;
  saveMonitors();
  renderMonitors();
}

function saveMonitors(){
  localStorage.setItem("monitors",JSON.stringify(monitors));
}

function loadMonitors(){
  try{var m=JSON.parse(localStorage.getItem("monitors")||"[]");monitors=m;}catch(e){monitors=[];}
}

function getBullet(id){return BULLETS.find(function(b){return b.id===id;});}

function renderMonitors(){
  var list=document.getElementById("monitorList");
  var cnt=document.getElementById("monitorCount");
  if(!list) return;
  cnt.textContent="已添加 "+monitors.length+" 个监控";
  if(monitors.length===0){
    list.innerHTML="<div class=\x27empty\x27>暂无监控<br><span style=\x27font-size:11px\x27>在行情详情页点击 +添加价格监控 来设置提醒</span></div>";
    return;
  }
  var h="";
  for(var i=0;i<monitors.length;i++){
    var m=monitors[i];
    var b=getBullet(m.bulletId);
    var curPrice=b?b.price:m.lastPrice;
    h+="<div class=\x27monitor-item\x27>";
    h+="<div class=\x27monitor-info\x27>";
    h+="<div class=\x27monitor-name\x27>"+esc(m.name)+" <span style=\x27font-size:9px;color:var(--muted)\x27>"+(GRADE_NAMES[m.grade]||"")+" ¥"+curPrice+"</span></div>";
    h+="<div>抄底≤<span class=\x27monitor-target\x27>¥"+m.targetBuy+"</span> | 出货≥<span class=\x27monitor-target\x27>¥"+m.targetSell+"</span></div>";
    h+="</div>";
    h+="<div class=\x27monitor-actions\x27>";
    h+="<span class=\x27badge "+(m.enabled?"badge-on":"badge-off")+"\x27 style=\x27cursor:pointer\x27 onclick=\x27toggleMonitor("+i+")\x27>"+(m.enabled?"▶ 启用":"⏸ 暂停")+"</span>";
    h+="<button class=\x27btn btn-sm\x27 onclick=\x27removeMonitor("+i+")\x27>✕</button>";
    h+="</div>";
    h+="</div>";
  }
  list.innerHTML=h;
}

function checkMonitors(){
  if(monitors.length===0) return;
  var now=Date.now();
  for(var i=0;i<monitors.length;i++){
    var m=monitors[i];
    if(!m.enabled) continue;
    // Cooldown: 10 min between alerts for same bullet
    if(now-m.alertedAt<600000) continue;
    var b=getBullet(m.bulletId);
    if(!b||!b.price) continue;
    var p=parseFloat(b.price);
    var prev=LAST_MN[m.bulletId]||p;
    LAST_MN[m.bulletId]=p;
    var msg="";
    if(p<=m.targetBuy&&m.targetBuy>0){
      msg="📉 "+m.name+" 跌至 ¥"+p+"（抄底目标 ¥"+m.targetBuy+"）";
    }else if(p>=m.targetSell&&m.targetSell>0){
      msg="📈 "+m.name+" 涨至 ¥"+p+"（出货目标 ¥"+m.targetSell+"）";
    }
    if(!msg) continue;
    m.alertedAt=now;
    saveMonitors();
    showToast(msg);
    if(notifGranted){
      try{new Notification("子弹交易提醒",{body:msg,icon:"🎯"});}catch(e){}
    }
  }
}

function checkNotif(){
  if(!("Notification" in window)) return;
  if(Notification.permission==="granted"){notifGranted=true;updateNotifBadge();}
}

function requestNotif(){
  if(!("Notification" in window)){showToast("⚠️ 浏览器不支持通知");return;}
  if(Notification.permission==="granted"){notifGranted=true;showToast("✅ 浏览器通知已开启");updateNotifBadge();return;}
  if(Notification.permission==="denied"){showToast("⚠️ 通知权限已被拒绝，请在浏览器设置中修改");return;}
  Notification.requestPermission().then(function(p){
    if(p==="granted"){notifGranted=true;showToast("✅ 浏览器通知已开启");}
    updateNotifBadge();
  });
}

function updateNotifBadge(){
  var el=document.getElementById("notifStatus");
  if(!el) return;
  if(notifGranted){el.textContent="通知: 已授权";el.className="badge badge-on";}
  else{el.textContent="通知: 未授权";el.className="badge badge-off";}
}

// ====== UTILS ======
function refreshData(){
  updateTime();
  checkMonitors();
  if(monitors.length>0) renderMonitors();
  showToast("✅ 数据已刷新 "+new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.classList.remove("show");},2500);
}

// ====== START ======
init();
