<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--accent:#18a058;--accent2:#1f6feb;--red:#f85149;--yellow:#d2991d;--r:10px}
:root.light{--bg:#f6f8fa;--card:#fff;--card2:#f0f2f5;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#1a7f37;--accent2:#0969da}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1500px;margin:0 auto;padding:10px 14px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:18px;font-weight:700;color:var(--accent)}
.topbar h1 span{color:var(--text);font-weight:400;font-size:13px;margin-left:6px}
.btn{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--card2);border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:3px 8px;font-size:10px}

.main-grid{display:grid;grid-template-columns:58px 260px 1fr;gap:10px}
@media(max-width:960px){.main-grid{grid-template-columns:1fr}}
.cat-bar{display:flex;flex-direction:column;gap:3px;padding:6px 2px;background:var(--card);border:1px solid var(--border);border-radius:10px;position:sticky;top:10px;max-height:calc(100vh-60px);overflow-y:auto}
.cat-btn{width:100%; padding:6px 4px;border-radius:6px;border:1px solid transparent;cursor:pointer;background:transparent;color:var(--muted);font-size:10px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px;text-align:center}
.cat-btn:hover{background:var(--card2);border-color:var(--border);color:var(--text)}
.cat-btn.active{background:rgba(24,160,88,.15);border-color:var(--accent);color:var(--accent)}
.cat-btn .c-emoji{font-size:16px}
.cat-btn .c-name{font-size:9px;line-height:1.1}
.cat-sep{height:1px;background:var(--border);margin:2px 4px}
@media(max-width:960px){.cat-bar{flex-direction:row;flex-wrap:wrap;position:static;max-height:none}.cat-btn{width:auto;flex-direction:row;gap:2px;padding:5px 8px}.cat-sep{display:none}}

.sidebar{display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 60px);overflow:hidden}
.sidebar input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:0}
.sidebar input:focus{border-color:var(--accent)}
.filter-row{display:flex;flex-wrap:wrap;gap:3px}
.tag{padding:2px 6px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted)}
.tag:hover,.tag.on{border-color:var(--accent);color:var(--text)}
.tag.on{background:rgba(24,160,88,.12);color:var(--accent)}

.item-list{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.item-list::-webkit-scrollbar{width:4px}.item-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#dbg{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);color:#0f0;font-size:10px;padding:4px;z-index:9999;max-height:60px;overflow-y:auto;font-family:monospace}
.item-row{display:flex;align-items:center;padding:5px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;font-size:11px;gap:6px}
.item-row:hover{background:var(--card2)}
.item-row.active{background:rgba(24,160,88,.08);border-color:var(--accent)}
.item-row .ir-img{width:22px;height:22px;border-radius:4px;object-fit:contain;background:var(--card2)}
.item-row .ir-grade{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;flex-shrink:0}
.g1{color:#9ca3af;border:1px solid #4b5563}.g2{color:#4ade80;border:1px solid #166534}.g3{color:#60a5fa;border:1px solid #1e40af}.g4{color:#a78bfa;border:1px solid #5b21b6}.g5{color:#fbbf24;border:1px solid #92400e}
.item-row .ir-name{font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-row .ir-price{font-weight:600;font-size:11px;color:var(--yellow);flex-shrink:0}

.detail-wrap{padding-top:8px}
.price-hero{background:linear-gradient(135deg,rgba(24,160,88,.06),rgba(31,111,235,.04));border:1px solid rgba(24,160,88,.15);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.p-hero-img{width:56px;height:56px;border-radius:8px;object-fit:contain;background:var(--card2);border:1px solid var(--border)}
.p-hero-name{font-size:15px;font-weight:700}
.p-hero-meta{font-size:11px;color:var(--muted)}
.p-price-big{font-size:26px;font-weight:900;color:var(--yellow);font-family:'Cascadia Code','Courier New',monospace}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
@media(max-width:600px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.stat-lbl{font-size:9px;color:var(--muted);margin-bottom:3px}
.stat-val{font-size:15px;font-weight:700;font-family:'Cascadia Code','Courier New',monospace}
.up{color:var(--accent)}.dn{color:var(--red)}

.chart-box{height:240px;margin-bottom:10px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.info-row span{color:var(--muted)}.info-row strong{color:var(--text)}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.empty-icon{font-size:40px;margin-bottom:8px}
</style>
</head>

function setGrade(g,e){ST.grade=g;document.querySelectorAll('#fRow .tag').forEach(function(t){t.classList.toggle('on',t.dataset.g==String(g))});if(e)e.target.blur();renderList()}
function filterList(){renderList(document.getElementById('sInput').value)}

function renderList(filter){
  var items=getItems();
  if(filter){filter=filter.toLowerCase();items=items.filter(function(x){return x.name.toLowerCase().includes(filter)})}
  items.sort(function(a,b){return a.price-b.price});
  var h='',imgs=catOrder.filter(function(k){return CAT_DATA[k]&&CAT_DATA[k].length}).map(function(k){return catNames[k]}).join('');
  if(items.length===0){h='<div class="empty"><div class="empty-icon">📭</div>无匹配物品</div>'}
  else items.forEach(function(b,i){h+='<div class="item-row'+(i===ST.idx?' active':'')+'" onclick="selectItem('+i+')"><img class="ir-img" src="'+b.img+'" onerror="this.hidden=true"><span class="ir-grade g'+b.grade+'">'+gt(b.grade)+'</span><span class="ir-name">'+b.name+'</span><span class="ir-price">'+hp(b.price)+'</span></div>'});
  document.getElementById('bList').innerHTML=h;
}

function selectItem(idx){ST.idx=idx;renderList();renderDetail()}

function renderDetail(){
  var b=getItem();
  if(!b){document.getElementById('detailArea').innerHTML='<div class="empty"><div class="empty-icon">👆</div>选择一个物品</div>';return}
  var h='<div class="price-hero"><img class="p-hero-img" src="'+b.img+'" onerror="this.hidden=true"><div><div class="p-hero-name">'+b.name+'</div><div class="p-hero-meta">'+gt(b.grade)+' | ID:'+b.id+'</div></div><div><div class="p-price-big">'+hp(b.price)+'</div></div></div><div class="stat-row"><div class="stat-card"><div class="stat-lbl">日涨跌</div><div class="stat-val '+tC(b.trend)+'">'+(b.trend>0?'+':'')+b.trend+'%</div></div><div class="stat-card"><div class="stat-lbl">昨日均价</div><div class="stat-val">'+hp(b.yep)+'</div></div><div class="stat-card"><div class="stat-lbl">前日均价</div><div class="stat-val">'+hp(b.dap)+'</div></div><div class="stat-card"><div class="stat-lbl">物品等级</div><div class="stat-val">'+gt(b.grade)+'</div></div></div>';
  if(b.code){h+='<div class="info-grid"><div class="info-row"><span>改枪码</span><strong>'+b.code+'</strong></div><div class="info-row"><span>作者</span><strong>'+b.author+'</strong></div><div class="info-row"><span>武器</span><strong>'+b.weapon+'</strong></div><div class="info-row"><span>ID</span><strong>'+b.id+'</strong></div></div>'}
  document.getElementById('detailArea').innerHTML=h;
}

// ═══ Loadout ═══
var ldMaps={loadout_k:[{l:'机密大坝',v:110000,c:'可用于零号大坝地图'},{l:'航天机密',v:180000,c:'可用于航天基地地图'},{l:'巴克什机密',v:180000,c:'可用于巴克什地图'},{l:'巴克什绝密',v:550000,c:'巴克什绝密模式'},{l:'航天绝密',v:600000,c:'航天基地绝密模式'},{l:'潮汐绝密',v:780000,c:'潮汐监狱绝密模式'}],loadout_diy:[{l:'轻度装',v:20000,c:'基础配置'},{l:'中配装',v:35000,c:'中等配置'},{l:'全装出击',v:50000,c:'良好装备'},{l:'顶配豪华',v:70000,c:'顶级配置'}]};

function showLoadout(cat){
  ST.cat=cat;ST.idx=-1;
  document.querySelectorAll('.cat-btn').forEach(function(e){e.classList.toggle('active',e.dataset.cat===cat)});
  document.getElementById('bList').innerHTML='';
  document.getElementById('fRow').style.display='none';
  var opts=ldMaps[cat]||[{l:'默认',v:30000}];
  var h='<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:20px"><h3 style="margin-bottom:16px">🎯 '+(cat==='loadout_k'?'卡战备配置':'凑战备DIY')+'</h3><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">';
  for(var i=0;i<opts.length;i++){h+='<button class="btn" onclick="calcLoadout('+opts[i].v+')">'+opts[i].l+' ('+(opts[i].v/10000).toFixed(1)+'万)</button>'}
  h+='<button class="btn" onclick="calcLoadout(parseInt(prompt(&apos;输入目标价值&apos;,30000))||30000)">🔢 自定义</button></div><div id="ltResult" style="max-height:400px;overflow-y:auto"></div><div id="ltSummary" style="margin-top:12px"></div></div>';
  document.getElementById('detailArea').innerHTML=h;
}

function calcLoadout(target){
  var slots=['helmet','armor','rig','backpack','barrel','grip','stock','handguard'];
  var picked={};var total=0;
  for(var si=0;si<slots.length;si++){
    var s=slots[si];var items=CAT_DATA[s];
    if(!items||!items.length)continue;
    var best=null;
    for(var j=0;j<items.length;j++){if(items[j].price>0&&(!best||items[j].price<best.price))best=items[j]}
    if(best){picked[s]=best;total+=best.price}
  }
  if(total<target){
    var upgrades=[];
    for(var sk in picked){
      var cur=picked[sk];var items2=CAT_DATA[sk]||[];
      for(var k=0;k<items2.length;k++){
        if(items2[k].price>cur.price){upgrades.push({slot:sk,item:items2[k],diff:items2[k].price-cur.price})}
      }
    }
    upgrades.sort(function(a,b){return a.diff-b.diff});
    for(var u=0;u<upgrades.length&&total<target;u++){
      var up=upgrades[u];total+=up.diff;picked[up.slot]=up.item
    }
  }
  var sel=[];
  for(var sk in picked)sel.push(picked[sk]);
  sel.sort(function(a,b){return a.price-b.price});
  var meta=total>=target?'✅达标':'⚠差'+(target-total).toLocaleString();
  var r='<div style="font-size:12px"><div style="margin-bottom:8px"><strong>'+sel.length+'</strong>槽位 目标<strong>'+target.toLocaleString()+'</strong> 达成<strong style="color:'+(total>=target?'var(--accent)':'var(--red)')+'">'+total.toLocaleString()+'</strong> '+meta+'</div>';
  var slotNames={helmet:'头盔',armor:'护甲',rig:'胸挂',backpack:'背包',barrel:'枪管',grip:'握把',stock:'枪托',handguard:'护木'};
  for(var p=0;p<sel.length;p++){var it=sel[p];r+='<div style="display:flex;justify-content:space-between;padding:5px 8px;'+(p%2?'background:var(--card)':'')+';border-radius:4px"><span>'+(p+1)+'. '+slotNames[it.t]||'其他'+' | '+it.name+' ['+it.grade+'级]</span><span style="color:var(--yellow);font-weight:600">'+hp(it.price)+'</span></div>'}
  r+='</div>';document.getElementById('ltResult').innerHTML=r;
  document.getElementById('ltSummary').innerHTML='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px"><strong>💰 总价：</strong><span style="color:var(--yellow);font-size:20px">'+hp(total)+'</span> | <strong>'+meta+'</strong></div>';
}
