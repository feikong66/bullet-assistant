<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子弹交易助手 - 三角洲行动</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14; --surface: #111820; --card: #1a2332; --card-hover: #243447;
  --border: #2a3441; --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
  --gold: #ffd700; --purple: #9d6cd9; --blue: #6a9bd1; --green: #4caf50; --gray: #9e9e9e;
  --rising: #f85149; --falling: #3fb950;
}
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg,var(--accent),#1f6feb); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.logo-text h1 { font-size: 16px; font-weight: 600; }
.logo-text p { font-size: 11px; color: var(--text2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.status-badge { padding: 6px 12px; border-radius: 16px; font-size: 12px; background: rgba(35,134,54,0.2); color: #3fb950; border: 1px solid rgba(35,134,54,0.3); }
.update-time { font-size: 12px; color: var(--text2); }
.theme-toggle { width: 36px; height: 36px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 16px; }
.tabs { display: flex; gap: 4px; padding: 8px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { padding: 8px 20px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-size: 14px; border-radius: 6px; display: flex; align-items: center; gap: 6px; }
.tab:hover { background: var(--card); color: var(--text); }
.tab.active { background: var(--card); color: var(--accent); font-weight: 500; }
.main-container { display: flex; height: calc(100vh - 120px); overflow: hidden; }
.left-panel { width: 320px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.search-box { padding: 16px; border-bottom: 1px solid var(--border); }
.search-input { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }
.filters { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.filter-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-btn { padding: 5px 12px; border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; border-radius: 14px; font-size: 12px; }
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-btn.g5.active { background: var(--gold); border-color: var(--gold); color: #000; }
.filter-btn.g4.active { background: var(--purple); border-color: var(--purple); }
.filter-btn.g3.active { background: var(--blue); border-color: var(--blue); }
.filter-btn.g2.active { background: var(--green); border-color: var(--green); }
.filter-btn.g1.active { background: var(--gray); border-color: var(--gray); }
.bullet-list { flex: 1; overflow-y: auto; padding: 8px; }
.bullet-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; position: relative; overflow: hidden; }
.bullet-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; opacity: 0; transition: opacity 0.15s; }
.bullet-item:hover { background: var(--card); }
.bullet-item.selected { background: var(--card); }
.bullet-item.selected::before { opacity: 1; }
.bullet-item.g5::before { background: linear-gradient(180deg,var(--gold),#b8860b); }
.bullet-item.g4::before { background: linear-gradient(180deg,var(--purple),#6a4fa8); }
.bullet-item.g3::before { background: linear-gradient(180deg,var(--blue),#4a7ab0); }
.bullet-item.g2::before { background: linear-gradient(180deg,var(--green),#2e7d32); }
.bullet-item.g1::before { background: linear-gradient(180deg,var(--gray),#616161); }
.bullet-icon { width: 40px; height: 40px; border-radius: 6px; background: var(--bg); object-fit: contain; padding: 2px; }
.bullet-info { flex: 1; min-width: 0; }
.bullet-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.bullet-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.grade-tag { padding: 1px 6px; border-radius: 8px; font-weight: 600; }
.grade-tag.g5 { background: rgba(255,215,0,0.2); color: var(--gold); }
.grade-tag.g4 { background: rgba(157,108,217,0.2); color: var(--purple); }
.grade-tag.g3 { background: rgba(106,155,209,0.2); color: var(--blue); }
.grade-tag.g2 { background: rgba(76,175,80,0.2); color: var(--green); }
.grade-tag.g1 { background: rgba(158,158,158,0.2); color: var(--gray); }
.pen-tag { color: var(--text2); }
.bullet-price { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 2px; }
.bullet-price .coin { font-size: 12px; }
.trend-indicator { font-size: 10px; margin-top: 2px; }
.trend-up { color: var(--rising); } .trend-down { color: var(--falling); } .trend-stable { color: var(--text2); }
.right-panel { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text2); text-align: center; padding: 40px; }
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.detail-header { background: linear-gradient(135deg,var(--card) 0%,var(--surface) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 20px; }
.detail-icon { width: 80px; height: 80px; border-radius: 12px; background: var(--bg); object-fit: contain; padding: 8px; border: 1px solid var(--border); }
.detail-title-section { flex: 1; }
.detail-name { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { padding: 4px 12px; border-radius: 14px; font-size: 12px; font-weight: 500; }
.tag.grade-5 { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
.tag.grade-4 { background: rgba(157,108,217,0.15); color: var(--purple); border: 1px solid rgba(157,108,217,0.3); }
.tag.grade-3 { background: rgba(106,155,209,0.15); color: var(--blue); border: 1px solid rgba(106,155,209,0.3); }
.tag.grade-2 { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
.tag.grade-1 { background: rgba(158,158,158,0.15); color: var(--gray); border: 1px solid rgba(158,158,158,0.3); }
.tag.pen { background: var(--bg); color: var(--text2); }
.tag.trend-up { background: rgba(248,81,73,0.15); color: var(--rising); border: 1px solid rgba(248,81,73,0.3); }
.tag.trend-down { background: rgba(63,185,80,0.15); color: var(--falling); border: 1px solid rgba(63,185,80,0.3); }
.detail-price-big { text-align: right; }
.detail-price-value { font-size: 36px; font-weight: 700; color: var(--gold); display: flex; align-items: center; gap: 8px; }
.detail-price-value .coin { width: 28px; height: 28px; background: linear-gradient(135deg,var(--gold),#b8860b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.price-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.chart-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; height: 200px; display: flex; align-items: center; justify-content: center; color: var(--text2); }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.stat-value { font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; }
.stat-value .coin { font-size: 14px; }
.stat-change { font-size: 11px; margin-top: 4px; }
.stat-change.up { color: var(--falling); } .stat-change.down { color: var(--rising); }
.time-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.time-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.time-card:hover { border-color: var(--accent); }
.time-card.best { background: linear-gradient(135deg,rgba(255,215,0,0.1),rgba(184,134,11,0.1)); border-color: var(--gold); }
.time-card-header { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.time-card-value { font-size: 16px; font-weight: 600; color: var(--accent); }
.time-card.best .time-card-value { color: var(--gold); }
.time-card-note { font-size: 10px; color: var(--text2); margin-top: 4px; }
.advice-section { background: linear-gradient(135deg,rgba(63,185,80,0.1),rgba(35,134,54,0.1)); border: 1px solid rgba(63,185,80,0.3); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
.advice-icon { width: 32px; height: 32px; background: rgba(63,185,80,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.advice-content h4 { font-size: 13px; color: var(--falling); margin-bottom: 4px; }
.advice-content p { font-size: 13px; color: var(--text2); line-height: 1.6; }
.props-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.props-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.prop-item { background: var(--surface); border-radius: 8px; padding: 12px 16px; }
.prop-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.prop-value { font-size: 14px; font-weight: 600; }
.prop-value.gold { color: var(--gold); } .prop-value.red { color: var(--rising); }
@media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .time-grid { grid-template-columns: repeat(2, 1fr); } .props-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .main-container { flex-direction: column; height: auto; } .left-panel { width: 100%; height: 400px; border-right: none; border-bottom: 1px solid var(--border); } }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">🔫</div>
    <div class="logo-text">
      <h1>子弹交易助手</h1>
      <p>三角洲行动 · 实时市场分析</p>
    </div>
  </div>
  <div class="header-right">
    <span class="status-badge" id="status">实时数据</span>
    <span class="update-time" id="updateTime">更新于 11:56</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('timing')">📊 子弹时机</button>
  <button class="tab" onclick="switchTab('calc')">🧮 收益计算</button>
</div>

<div class="main-container" id="mainContainer">
  <div class="left-panel">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索子弹名称或口径..." oninput="searchBullets(this.value)">
    </div>
    <div class="filters">
      <div class="filter-group">
        <button class="filter-btn active" data-grade="all" onclick="filterGrade('all')">全部</button>
        <button class="filter-btn g5" data-grade="5" onclick="filterGrade(5)">五级</button>
        <button class="filter-btn g4" data-grade="4" onclick="filterGrade(4)">四级</button>
        <button class="filter-btn g3" data-grade="3" onclick="filterGrade(3)">三级</button>
        <button class="filter-btn g2" data-grade="2" onclick="filterGrade(2)">二级</button>
        <button class="filter-btn g1" data-grade="1" onclick="filterGrade(1)">一级</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn" data-trend="rising" onclick="filterTrend('rising')">📈 涨价</button>
        <button class="filter-btn" data-trend="falling" onclick="filterTrend('falling')">📉 跌价</button>
      </div>
    </div>
    <div class="bullet-list" id="bulletList"></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="empty-state">
      <div class="empty-state-icon">📊</div>
      <h3>选择子弹查看详情</h3>
      <p>从左侧列表选择一颗子弹，查看实时价格、最佳买入时段和交易建议</p>
    </div>
  </div>
</div>

const gradeNames = {5:'五级',4:'四级',3:'三级',2:'二级',1:'一级'};
const gradeColors = {5:'#ffd700',4:'#9d6cd9',3:'#6a9bd1',2:'#4caf50',1:'#9e9e9e'};

let activeGrade = 'all', activeTrend = null, selectedBullet = null;

function generateMockData(bullet) {
  const price = bullet[5];
  return {
    todayLow: Math.floor(price * 0.94),
    todayHigh: Math.floor(price * 1.08),
    avg30: Math.floor(price * 0.98),
    change7d: (Math.random() * 20 - 5).toFixed(1),
    bestTimes: { general: bullet[7].split(' ')[1] || '00:00-06:00', weekday: '02:00-06:00', weekend: '01:00-05:00', optimal: '03:00-04:00' },
    advice: bullet[6] === 'rising' ? '当前价格处于上涨趋势，建议等待凌晨时段(00:00-06:00)再买入，预计可节省5-10%成本。' : '当前价格处于合理区间，建议在' + bullet[7] + '时段买入。',
    caliber: bullet[1].match(/[\d.]+x[\d.]+mm/)?.[0] || bullet[1].match(/[\d.]+mm/)?.[0] || '未知',
    ammoType: 'rifle · 步枪弹',
    feeRate: {1:0.10, 2:0.10, 3:0.13, 4:0.17, 5:0.20}[bullet[2]] || 0.20
  };
}

function renderBulletList() {
  const list = document.getElementById('bulletList');
  let filtered = BULLETS.filter(b => {
    if (activeGrade !== 'all' && b[2] !== activeGrade) return false;
    if (activeTrend && b[6] !== activeTrend) return false;
    return true;
  });
  
  const search = document.getElementById('searchInput').value.toLowerCase();
  if (search) filtered = filtered.filter(b => b[1].toLowerCase().includes(search));
  
  list.innerHTML = filtered.map(b => `
    <div class="bullet-item g${b[2]} ${selectedBullet?.[0] === b[0] ? 'selected' : ''}" onclick="selectBullet(${b[0]})">
      <img class="bullet-icon" src="${b[8]}" onerror="this.style.opacity=0.3">
      <div class="bullet-info">
        <div class="bullet-name">${b[1]}</div>
        <div class="bullet-meta">
          <span class="grade-tag g${b[2]}">${gradeNames[b[2]]}</span>
          <span class="pen-tag">穿透 ${b[4] || '?'}</span>
        </div>
      </div>
      <div>
        <div class="bullet-price">🪙 ${b[5].toLocaleString()}</div>
        <div class="trend-indicator ${b[6] === 'rising' ? 'trend-up' : b[6] === 'falling' ? 'trend-down' : 'trend-stable'}">
          ${b[6] === 'rising' ? '📈 涨价' : b[6] === 'falling' ? '📉 跌价' : '➖ 稳定'}
        </div>
      </div>
    </div>
  `).join('');
}

function selectBullet(id) {
  selectedBullet = BULLETS.find(b => b[0] === id);
  if (!selectedBullet) return;
  renderBulletList();
  renderDetail(selectedBullet);
}

function renderDetail(b) {
  const mock = generateMockData(b);
  const panel = document.getElementById('rightPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <img class="detail-icon" src="${b[8]}" onerror="this.style.display='none'">
      <div class="detail-title-section">
        <div class="detail-name">${b[1]}</div>
        <div class="detail-tags">
          <span class="tag grade-${b[2]}">${gradeNames[b[2]]}</span>
          <span class="tag pen">穿透 ${b[4] || '?'}</span>
          <span class="tag ${b[6] === 'rising' ? 'trend-up' : b[6] === 'falling' ? 'trend-down' : ''}">
            ${b[6] === 'rising' ? '📈 涨价中' : b[6] === 'falling' ? '📉 跌价中' : '➖ 价格稳定'}
          </span>
        </div>
      </div>
      <div class="detail-price-big">
        <div class="detail-price-value"><span class="coin">🪙</span> ${b[5].toLocaleString()}</div>
        <div class="price-label">当前市场价格</div>
      </div>
    </div>
    <div class="chart-section">📈 价格走势图 (接入API后显示)</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">今日最低</div>
        <div class="stat-value">🪙 ${mock.todayLow.toLocaleString()}</div>
        <div class="stat-change down">-3.4%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日最高</div>
        <div class="stat-value">🪙 ${mock.todayHigh.toLocaleString()}</div>
        <div class="stat-change up">+3.7%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">30日均价</div>
        <div class="stat-value">🪙 ${mock.avg30.toLocaleString()}</div>
        <div class="stat-change">+8.1% vs均价</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">7日变化</div>
        <div class="stat-value" style="color:${mock.change7d > 0 ? 'var(--falling)' : 'var(--rising)'}">
          ${mock.change7d > 0 ? '+' : ''}${mock.change7d}%
        </div>
        <div class="stat-change">${mock.change7d > 0 ? '持续上涨 📈' : '持续下跌 📉'}</div>
      </div>
    </div>
    <div class="time-section">
      <div class="section-title">🕐 最佳买入时段</div>
      <div class="time-grid">
        <div class="time-card">
          <div class="time-card-header">综合建议</div>
          <div class="time-card-value">${mock.bestTimes.general}</div>
          <div class="time-card-note">凌晨最低价</div>
        </div>
        <div class="time-card">
          <div class="time-card-header">工作日</div>
          <div class="time-card-value">${mock.bestTimes.weekday}</div>
          <div class="time-card-note">深夜低谷期</div>
        </div>
        <div class="time-card">
          <div class="time-card-header">周末</div>
          <div class="time-card-value">${mock.bestTimes.weekend}</div>
          <div class="time-card-note">凌晨最低</div>
        </div>
        <div class="time-card best">
          <div class="time-card-header">最佳窗口 ⭐</div>
          <div class="time-card-value">${mock.bestTimes.optimal}</div>
          <div class="time-card-note">价格谷底区间</div>
        </div>
      </div>
    </div>
    <div class="advice-section">
      <div class="advice-icon">💡</div>
      <div class="advice-content">
        <h4>买入建议</h4>
        <p>${mock.advice}</p>
      </div>
    </div>
    <div class="props-section">
      <div class="section-title">📋 子弹属性</div>
      <div class="props-grid">
        <div class="prop-item">
          <div class="prop-label">子弹名称</div>
          <div class="prop-value" style="font-size:12px">${b[1]}</div>
        </div>
        <div class="prop-item">
          <div class="prop-label">等级</div>
          <div class="prop-value gold">${gradeNames[b[2]]} · 顶级弹药</div>
        </div>
        <div class="prop-item">
          <div class="prop-label">穿透等级</div>
          <div class="prop-value">${b[4] || '?'} / 100</div>
        </div>
        <div class="prop-item">
          <div class="prop-label">弹药类型</div>
          <div class="prop-value">${mock.ammoType}</div>
        </div>
        <div class="prop-item">
          <div class="prop-label">口径</div>
          <div class="prop-value">${mock.caliber}</div>
        </div>
        <div class="prop-item">
          <div class="prop-label">交易手续费</div>
          <div class="prop-value red">${(mock.feeRate * 100).toFixed(0)}%</div>
        </div>
      </div>
    </div>
  `;
}

function filterGrade(g) {
  document.querySelectorAll('.filter-btn[data-grade]').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-grade="' + g + '"]').classList.add('active');
  activeGrade = g;
  renderBulletList();
}

function filterTrend(t) {
  if (activeTrend === t) {
    activeTrend = null;
    document.querySelectorAll('.filter-btn[data-trend]').forEach(b => b.classList.remove('active'));
  } else {
    activeTrend = t;
    document.querySelectorAll('.filter-btn[data-trend]').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-trend="' + t + '"]').classList.add('active');
  }
  renderBulletList();
}

function searchBullets(q) {
  renderBulletList();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  // TODO: calc tab
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.querySelector('.theme-toggle');
  btn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
}

renderBulletList();
