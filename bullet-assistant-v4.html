// ═══════════════════════════════════════════════════════════
// 标签切换
// ═══════════════════════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// 白夜模式
// ═══════════════════════════════════════════════════════════
function initTheme() {
  isDark = localStorage.getItem('theme') !== 'light';
  applyTheme();
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();

// ═══════════════════════════════════════════════════════════
// Canvas 价格走势图
// ═══════════════════════════════════════════════════════════
function drawChart(bullet) {
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);

  const w = rect.width - 20;
  const h = 190;
  const pad = {top:20,right:10,bottom:30,left:50};

  // Generate mock data
  const base = bullet.p || 1000;
  const days = 30;
  const points = [];
  let val = base * 1.1;
  for (let i = 0; i < days; i++) {
    val += (Math.random() - 0.52) * base * 0.04;
    val = Math.max(val, base * 0.85);
    val = Math.max(val, 1);
    points.push(val);
  }

  const max = Math.max(...points) * 1.05;
  const min = Math.min(...points) * 0.95;
  const range = max - min || 1;

  const xScale = (w - pad.left - pad.right) / (days - 1);
  const yScale = (h - pad.top - pad.bottom) / range;

  // Grid
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = pad.top + (h - pad.top - pad.bottom) * i / 4;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
  }

  // Y axis labels
  ctx.fillStyle = isDark ? '#8b949e' : '#999';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    const val = max - range * i / 4;
    const y = pad.top + (h - pad.top - pad.bottom) * i / 4;
    ctx.fillText(Math.round(val).toLocaleString(), pad.left - 6, y + 3);
  }

  // Line + fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
  grad.addColorStop(0, isDark ? 'rgba(59,130,246,0.2)' : 'rgba(37,99,235,0.12)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.beginPath();
  points.forEach((v, i) => {
    const x = pad.left + i * xScale;
    const y = pad.top + (max - v) * yScale;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  const lastX = pad.left + (days - 1) * xScale;
  const lastY = pad.top + (max - points[days - 1]) * yScale;
  ctx.lineTo(lastX, h - pad.bottom);
  ctx.lineTo(pad.left, h - pad.bottom);
  ctx.closePath();

  // Use a simple gradient style
  ctx.fillStyle = isDark ? 'rgba(59,130,246,0.08)' : 'rgba(37,99,235,0.06)';
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((v, i) => {
    const x = pad.left + i * xScale;
    const y = pad.top + (max - v) * yScale;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = isDark ? '#3b82f6' : '#2563eb';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dot at end
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = isDark ? '#60a5fa' : '#2563eb';
  ctx.fill();

  // Current price label
  ctx.fillStyle = isDark ? '#e6edf3' : '#1a1a2e';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🪙' + Math.round(points[days - 1]).toLocaleString(), lastX + 8, lastY + 4);
}

// ═══════════════════════════════════════════════════════════
// 收益计算
// ═══════════════════════════════════════════════════════════
function calc() {
  const buyPrice = parseFloat(document.getElementById('buyPrice').value) || 0;
  const buyQty = parseInt(document.getElementById('buyQty').value) || 0;
  const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;
  const sellQty = parseInt(document.getElementById('sellQty').value) || 0;
  const grade = selectedCalc ? selectedCalc.g : 3;
  const feeRate = FEE_RATES[grade] || 0.17;

  if (!buyPrice || !buyQty) {
    document.getElementById('resultBlock').innerHTML = '<div style="font-size:12px;color:var(--text2);text-align:center;padding:20px">输入价格后计算</div>';
    return;
  }

  const buyTotal = buyPrice * buyQty;
  const buyFee = Math.floor(buyTotal * feeRate);
  const buyCost = buyTotal + buyFee;

  const breakEven = buyPrice / (1 - feeRate);

  if (!sellPrice || !sellQty) {
    document.getElementById('resultBlock').innerHTML = `
      <div class="result-row"><span>买入总额</span><span class="rr-val">🪙${buyTotal.toLocaleString()}</span></div>
      <div class="result-row"><span>买入手续费 (${Math.round(feeRate*100)}%)</span><span class="rr-val" style="color:var(--red)">🪙${buyFee.toLocaleString()}</span></div>
      <div class="result-row"><span>实际成本</span><span class="rr-val">🪙${buyCost.toLocaleString()}</span></div>
      <div class="result-row"><span>保本单价</span><span class="rr-val" style="color:var(--accent2)">🪙${Math.ceil(breakEven).toLocaleString()}</span></div>
    `;
  } else {
    const sellTotal = sellPrice * Math.min(sellQty, buyQty);
    const sellFee = Math.floor(sellTotal * feeRate);
    const sellRevenue = sellTotal - sellFee;
    const matchedCost = buyPrice * Math.min(sellQty, buyQty) + Math.floor(buyPrice * Math.min(sellQty, buyQty) * feeRate);
    const profit = sellRevenue - matchedCost;
    const profitRate = matchedCost > 0 ? (profit / matchedCost * 100).toFixed(1) : 0;

    document.getElementById('resultBlock').innerHTML = `
      <div class="result-row"><span>买入总额</span><span class="rr-val">🪙${buyTotal.toLocaleString()}</span></div>
      <div class="result-row"><span>买入手续费</span><span class="rr-val" style="color:var(--red)">🪙${buyFee.toLocaleString()}</span></div>
      <div class="result-row"><span>卖出收入</span><span class="rr-val">🪙${sellTotal.toLocaleString()}</span></div>
      <div class="result-row"><span>卖出手续费</span><span class="rr-val" style="color:var(--red)">🪙${sellFee.toLocaleString()}</span></div>
      <div class="result-row"><span>保本单价</span><span class="rr-val" style="color:var(--accent2)">🪙${Math.ceil(breakEven).toLocaleString()}</span></div>
      <div class="result-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        <span style="font-weight:700">💰 净利润</span>
        <span class="rr-val rr-profit ${profit >= 0 ? 'rr-positive' : 'rr-negative'}">
          🪙${profit.toLocaleString()} (${profitRate}%)
        </span>
      </div>
    `;
  }
}

/* History */

.history-left { display:flex; flex-direction:column; gap:2px; }

.history-right { text-align:right; }

/* Import Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; max-width:400px; width:100%; max-height:80vh; overflow-y:auto; }
.modal-title { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--text); }
.modal textarea { width:100%; height:150px; background:#070e18; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:11px; font-family:monospace; padding:8px; resize:vertical; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:12px; z-index:1001; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }

  <div class="header-actions">
    <button class="refresh-btn" onclick="refreshPrices()" title="刷新数据">🔄</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="切换模式">🌙</button>
  </div>
</div>

<!-- 标签导航 -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('timing',this)">📊 子弹时机</button>
  <button class="tab-btn" onclick="switchTab('calc',this)">🧮 收益计算</button>
</div>

<!-- ═══ 时机标签页 ═══ -->
<div class="tab-content active" id="tab-timing">
  <div class="split-layout">
    <!-- 左侧：子弹列表 -->
    <div class="left-panel">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="searchInput" placeholder="搜索子弹名称..." oninput="filterBullets()">
      </div>
      <div class="filter-tags">
        <button class="filter-tag active" onclick="filterGrade(0,this)">全部</button>
        <button class="filter-tag" onclick="filterGrade(5,this)" style="color:#f59e0b">五级</button>
        <button class="filter-tag" onclick="filterGrade(4,this)" style="color:#a855f7">四级</button>
        <button class="filter-tag" onclick="filterGrade(3,this)" style="color:#3b82f6">三级</button>
        <button class="filter-tag" onclick="filterGrade(2,this)" style="color:#10b981">二级</button>
        <button class="filter-tag" onclick="filterGrade(1,this)" style="color:#9ca3af">一级</button>
      </div>
      <div class="filter-tags" style="margin-top:2px">
        <button class="filter-tag active" onclick="filterTrend('all',this)">全部趋势</button>
        <button class="filter-tag" onclick="filterTrend('up',this)">📈 上涨</button>
        <button class="filter-tag" onclick="filterTrend('down',this)">📉 下跌</button>
        <button class="filter-tag" onclick="filterTrend('stable',this)">📊 平稳</button>
      </div>
      <div class="bl-list" id="blList"></div>
    </div>
    <!-- 右侧：详情 -->
    <div class="right-panel">
      <div id="detailEmpty" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:15px;min-height:400px;">
        👈 选择子弹查看详情
      </div>
      <div id="detailPanel" style="display:none;">
        <div class="detail-hero">
          <img id="dhPic" src="" alt="">
          <div style="flex:1">
            <div class="dh-name" id="dhName"></div>
            <span class="dh-grade" id="dhGrade"></span>
            <div class="dh-trend" id="dhTrend"></div>
            <div style="margin-top:6px"><span class="dh-price" id="dhPrice"></span></div>
            <div style="font-size:11px;color:var(--text2)" id="dhBestTime"></div>
          </div>
        </div>
        <div class="chart-container">
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px">📈 近期价格走势</div>
          <canvas id="priceChart"></canvas>
        </div>
        <div class="stat-grid" id="statGrid"></div>
        <div id="suggestionArea"></div>
        <div class="best-times">
          <div class="time-slot">
            <div class="ts-label">最佳购买时段</div>
            <div class="ts-time" id="bestTimeSlot">-</div>
          </div>
        </div>
        <div class="props-grid" id="propsGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 计算器标签页 ═══ -->
<div class="tab-content" id="tab-calc">
  <div class="split-layout">
    <div class="left-panel">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="calcSearch" placeholder="搜索子弹..." oninput="filterCalcList()">
      </div>
      <div class="bl-list" id="calcBulletList"></div>
    </div>
    <div class="right-panel" id="calcRight">
      <div id="calcEmpty" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:15px;min-height:400px;">
        👈 选择子弹开始计算
      </div>
      <div id="calcPanel" style="display:none;">
        <div class="calc-card">
          <h3 id="calcBulletName">-</h3>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            <img id="calcBulletImg" src="" style="width:48px;height:48px;border-radius:6px;object-fit:cover">
            <div>
              <span id="calcBulletGrade" style="padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700"></span>
              <span style="font-size:12px;color:var(--text2);margin-left:8px">参考价: <strong id="calcRefPrice">-</strong></span>
            </div>
          </div>
          <div class="calc-row">
            <span class="clabel">买入价</span>
            <input class="calc-input" type="number" id="buyPrice" placeholder="单价" oninput="calc()">
            <input class="calc-input small" type="number" id="buyQty" placeholder="数量" oninput="calc()" value="1">
          </div>
          <div class="calc-row">
            <span class="clabel">卖出价</span>
            <input class="calc-input" type="number" id="sellPrice" placeholder="单价" oninput="calc()">
            <input class="calc-input small" type="number" id="sellQty" placeholder="数量" oninput="calc()" value="1">
          </div>
          <div class="notif-row">
            <button class="notif-toggle" id="notifToggle" onclick="toggleNotif()" title="切换通知"></button>
            <span>Web通知提醒</span>
            <span style="margin-left:auto;font-size:11px;color:var(--text2)">手续费: <strong id="feeRate">17%</strong></span>
          </div>
          <div class="result-block" id="resultBlock">
            <div style="font-size:12px;color:var(--text2);text-align:center;padding:20px">输入价格后计算</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>


</body>
</html>
